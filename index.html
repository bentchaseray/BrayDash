<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Bray Films · Studio OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0e10;
    --bg-2: #141416;
    --sidebar: #08080a;
    --card: #18181b;
    --card-2: #1f1f23;
    --line: rgba(255,255,255,.06);
    --line-2: rgba(255,255,255,.10);
    --ink: #ececee;
    --ink-2: #a8a8ad;
    --ink-3: #6b6b73;
    --gold: #c49a3c;
    --gold-2: #e3b85a;
    --gold-soft: rgba(196,154,60,.14);
    --green: #34d399;
    --blue: #60a5fa;
    --orange: #f59e0b;
    --red: #ef4444;
    --shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 12px 30px rgba(0,0,0,.35), 0 2px 8px rgba(0,0,0,.25);
    --logo-a: #25252a;
    --logo-b: #131316;
    --pill-a: #1c1c20;
    --pill-b: #131316;
    --ambient-1: rgba(196,154,60,.06);
    --ambient-2: rgba(255,255,255,.025);
    --pad: 26px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, var(--ambient-1), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, var(--ambient-2), transparent 60%),
      var(--bg);
    min-height: 100vh;
  }

  /* -- Layout -- */
  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .sidebar {
    background: var(--sidebar);
    border-right: 1px solid var(--line);
    padding: 22px 16px 16px;
    display: flex; flex-direction: column; gap: 22px;
    position: sticky; top: 0; height: 100vh; overflow: hidden;
  }
  .logo { display: flex; align-items: center; gap: 10px; padding: 4px 8px 16px; border-bottom: 1px solid var(--line); }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 9px;
    background: linear-gradient(160deg, var(--logo-a), var(--logo-b));
    border: 1px solid var(--line-2);
    display: grid; place-items: center;
    box-shadow: 0 0 0 1px rgba(196,154,60,.18) inset, 0 8px 20px rgba(196,154,60,.10);
  }
  .logo-mark svg { color: var(--gold); }
  .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
  .logo-text b { font-size: 13px; letter-spacing: .14em; }
  .logo-text small { font-size: 10px; color: var(--ink-3); letter-spacing: .22em; text-transform: uppercase; }

  .nav-section { display: flex; flex-direction: column; gap: 2px; }
  .nav-label { font-size: 10px; letter-spacing: .22em; color: var(--ink-3); padding: 8px 10px; text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px; border-radius: 8px;
    color: var(--ink-2); font-size: 13.5px; font-weight: 500;
    cursor: pointer; user-select: none; position: relative;
    transition: all .15s ease;
  }
  .nav-item:hover { background: rgba(255,255,255,.03); color: var(--ink); }
  .nav-item.active {
    background: linear-gradient(180deg, rgba(196,154,60,.14), rgba(196,154,60,.06));
    color: #fff;
    box-shadow: inset 0 0 0 1px rgba(196,154,60,.25);
  }
  .nav-item.active::before {
    content: ""; position: absolute; left: -16px; top: 8px; bottom: 8px; width: 3px;
    background: var(--gold); border-radius: 0 3px 3px 0;
  }
  .nav-item.active .nav-ic { color: var(--gold); }
  .nav-ic { width: 18px; height: 18px; color: var(--ink-3); display: grid; place-items: center; }

  .sidebar-foot { margin-top: auto; }
  .profile-pill {
    display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px;
    background: linear-gradient(180deg, var(--pill-a), var(--pill-b));
    border: 1px solid var(--line-2);
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #c49a3c 0%, #6d4f1c 100%);
    color: #0b1220; font-weight: 700; font-size: 13px;
    display: grid; place-items: center;
    box-shadow: 0 0 0 2px rgba(196,154,60,.15);
  }
  .who { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
  .who b { font-size: 13px; color: var(--ink); }
  .who small { font-size: 11px; color: var(--ink-3); }
  .online-dot { margin-left: auto; width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }

  /* -- Main -- */
  main { padding: var(--pad) calc(var(--pad) + 6px) 48px; min-width: 0; overflow-y: auto; max-height: 100vh; }
  .topbar { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 28px; }
  .crumb { font-size: 11px; letter-spacing: .22em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .live-badge { display: inline-flex; align-items: center; gap: 6px; color: var(--green); }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.6)} 50%{box-shadow:0 0 0 6px rgba(52,211,153,0)} }
  h1.page-title { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .subtitle { color: var(--ink-2); font-size: 14px; margin-top: 6px; }
  .subtitle em { color: var(--gold); font-style: normal; font-weight: 600; }
  .top-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .clock-widget {
    background: var(--card); border: 1px solid var(--line);
    padding: 10px 14px; border-radius: 10px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow);
  }
  .clock-t { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; letter-spacing: .03em; }
  .clock-d { font-size: 11px; color: var(--ink-3); letter-spacing: .12em; text-transform: uppercase; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--card); border: 1px solid var(--line);
    display: grid; place-items: center; color: var(--ink-2);
    cursor: pointer; position: relative; box-shadow: var(--shadow);
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--line-2); }
  .notif-dot { position: absolute; top: 9px; right: 9px; width: 7px; height: 7px; border-radius: 50%; background: var(--red); box-shadow: 0 0 0 2px var(--card); }
  .new-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(180deg, var(--gold-2), var(--gold));
    color: #1a1305; font-weight: 600; font-size: 13px;
    padding: 10px 14px; border-radius: 10px; border: 0; cursor: pointer;
    box-shadow: 0 6px 14px rgba(196,154,60,.30), inset 0 1px 0 rgba(255,255,255,.25);
  }

  /* -- Stat cards -- */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 24px; }
  .stat {
    background: linear-gradient(180deg, var(--card), var(--bg-2));
    border: 1px solid var(--line); border-radius: 14px; padding: 18px;
    box-shadow: var(--shadow); position: relative; overflow: hidden;
    transition: transform .15s ease, border-color .15s ease;
    cursor: pointer;
  }
  .stat:hover { transform: translateY(-2px); border-color: var(--line-2); }
  .stat-row1 { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .stat-label { font-size: 12px; color: var(--ink-2); letter-spacing: .04em; }
  .stat-value { font-size: 32px; font-weight: 700; letter-spacing: -.02em; margin-top: 10px; line-height: 1; font-family: 'JetBrains Mono', monospace; }
  .stat-unit { font-size: 18px; color: var(--ink-2); font-weight: 500; margin-left: 4px; }
  .stat-delta { margin-top: 12px; font-size: 12px; color: var(--ink-2); display: flex; align-items: center; gap: 6px; }
  .stat-delta b { font-weight: 600; }
  .stat-badge {
    width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; flex-shrink: 0;
    background: var(--sb-soft, rgba(255,255,255,.05)); color: var(--sb-c, var(--ink));
    box-shadow: inset 0 0 0 1px var(--sb-line, var(--line-2));
  }
  .stat.s-green { --sb-c: var(--green); --sb-soft: rgba(52,211,153,.12); --sb-line: rgba(52,211,153,.25); }
  .stat.s-blue  { --sb-c: var(--blue);  --sb-soft: rgba(96,165,250,.12); --sb-line: rgba(96,165,250,.25); }
  .stat.s-gold  { --sb-c: var(--gold);  --sb-soft: rgba(196,154,60,.16); --sb-line: rgba(196,154,60,.30); }
  .stat.s-orange{ --sb-c: var(--orange);--sb-soft: rgba(245,158,11,.12); --sb-line: rgba(245,158,11,.25); }
  .stat-delta.d-green b { color: var(--green); }
  .stat-delta.d-blue  b { color: var(--blue); }
  .stat-delta.d-gold  b { color: var(--gold); }
  .stat-delta.d-orange b { color: var(--orange); }
  .spark-wrap { position: absolute; right: 0; bottom: 0; opacity: .35; pointer-events: none; }

  /* -- Two-column body -- */
  .body-grid { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 22px; }
  .stack { display: flex; flex-direction: column; gap: 22px; }
  .right-col { display: flex; flex-direction: column; gap: 22px; }

  /* -- Panel -- */
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--line); }
  .panel-head h3 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: -.005em; }
  .ph-meta { font-size: 11px; color: var(--ink-3); letter-spacing: .12em; text-transform: uppercase; }
  .ph-link { font-size: 12px; color: var(--ink-2); cursor: pointer; }
  .ph-link:hover { color: var(--gold); }
  .ph-right { display: flex; gap: 8px; align-items: center; }

  /* -- Pipeline grid -- */
  .lead-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
  .lead-card {
    background: linear-gradient(180deg, var(--card-2), var(--card));
    border: 1px solid var(--line); border-radius: 12px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
    cursor: pointer; transition: all .18s ease; position: relative; overflow: hidden;
  }
  .lead-card:hover { border-color: rgba(196,154,60,.35); transform: translateY(-1px); }
  .lead-card::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(400px 120px at 100% 0%, rgba(196,154,60,.06), transparent 60%);
  }
  .lead-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .lead-name { font-size: 15px; font-weight: 600; }
  .lead-sub { font-size: 12px; color: var(--ink-3); margin-top: 1px; }
  .lead-actions-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-top: 4px; }
  .lead-action-lbl { display: block; font-size: 11px; color: var(--ink-3); letter-spacing: .14em; font-weight: 500; margin-bottom: 3px; }
  .lead-action-text { font-size: 12.5px; color: var(--ink-2); }
  .lead-value { font-size: 20px; font-weight: 700; color: var(--gold); font-family: 'JetBrains Mono', monospace; letter-spacing: -.01em; white-space: nowrap; }
  .lead-meta { display: flex; gap: 14px; font-size: 11px; color: var(--ink-3); }
  .lead-meta span { display: inline-flex; align-items: center; gap: 5px; }
  .lead-meta b { color: var(--ink-2); font-weight: 500; }

  /* Badges */
  .badge-hot {
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    font-size: 10px; letter-spacing: .15em; font-weight: 700;
    color: #ffd1d1; background: rgba(239,68,68,.14); border: 1px solid rgba(239,68,68,.30);
    padding: 4px 8px; border-radius: 999px;
  }
  .ember { width: 5px; height: 5px; background: #ff5b5b; border-radius: 50%; box-shadow: 0 0 8px #ff5b5b; }
  .badge-warm {
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    font-size: 10px; letter-spacing: .15em; font-weight: 700;
    color: #bfdbfe; background: rgba(96,165,250,.12); border: 1px solid rgba(96,165,250,.25);
    padding: 4px 8px; border-radius: 999px;
  }
  .badge-ok {
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    font-size: 10px; letter-spacing: .12em; font-weight: 700;
    color: #a7f3d0; background: rgba(52,211,153,.12); border: 1px solid rgba(52,211,153,.25);
    padding: 3px 8px; border-radius: 999px;
  }
  .badge-pending {
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    font-size: 10px; letter-spacing: .12em; font-weight: 700;
    color: #fde68a; background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.25);
    padding: 3px 8px; border-radius: 999px;
  }
  .badge-past {
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    font-size: 10px; letter-spacing: .12em; font-weight: 700;
    color: var(--ink-3); background: rgba(255,255,255,.05); border: 1px solid var(--line);
    padding: 3px 8px; border-radius: 999px;
  }

  /* -- Shoot cards (command center 3-col) -- */
  .shoots-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px; }
  .shoot-sm {
    background: linear-gradient(180deg, var(--card-2), var(--card));
    border: 1px solid var(--line); border-radius: 12px; padding: 16px;
    position: relative; overflow: hidden; cursor: pointer; transition: all .18s ease;
  }
  .shoot-sm:hover { transform: translateY(-1px); border-color: var(--line-2); }
  .shoot-cd { font-family: 'JetBrains Mono', monospace; font-size: 44px; font-weight: 700; line-height: 1; color: var(--gold); letter-spacing: -.04em; }
  .shoot-cd-lbl { font-size: 11px; color: var(--ink-3); letter-spacing: .22em; display: block; margin-top: 6px; font-weight: 500; }
  .shoot-title { font-size: 14px; font-weight: 600; margin-top: 14px; }
  .shoot-where { font-size: 12px; color: var(--ink-2); margin-top: 2px; }
  .shoot-foot { margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--line-2); display: flex; align-items: center; justify-content: space-between; font-size: 11.5px; color: var(--ink-3); }
  .shoot-net { color: var(--ink); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .shoot-ribbon { position: absolute; top: 14px; right: 14px; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); }

  /* -- Priorities -- */
  .priorities-list { padding: 8px; }
  .pri {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px; border-radius: 10px; transition: background .15s ease;
  }
  .pri:hover { background: rgba(255,255,255,.025); }
  .pri-num { width: 22px; height: 22px; border-radius: 6px; background: rgba(196,154,60,.12); color: var(--gold); font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; display: grid; place-items: center; flex-shrink: 0; margin-top: 1px; }
  .chk { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--ink-3); cursor: pointer; flex-shrink: 0; margin-top: 2px; display: grid; place-items: center; transition: all .15s ease; }
  .chk.on { background: var(--gold); border-color: var(--gold); color: #1a1305; }
  .chk.on svg { display: block; }
  .chk svg { display: none; }
  .pri-body { flex: 1; min-width: 0; }
  .pri-text { font-size: 13.5px; color: var(--ink); font-weight: 500; line-height: 1.35; }
  .pri.done .pri-text { color: var(--ink-3); text-decoration: line-through; }

  /* -- Revenue bar -- */
  .rev-wrap { padding: 16px 18px 18px; }
  .rev-top-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; }
  .rev-big { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
  .rev-of { color: var(--ink-3); font-size: 16px; font-weight: 500; }
  .rev-pct-badge { font-size: 12px; color: var(--gold); font-weight: 600; padding: 4px 8px; border-radius: 6px; background: var(--gold-soft); border: 1px solid rgba(196,154,60,.20); }
  .rev-bar { height: 10px; border-radius: 6px; overflow: hidden; background: rgba(255,255,255,.04); display: flex; box-shadow: inset 0 0 0 1px var(--line); }
  .seg-c { background: linear-gradient(90deg, #10b981, #34d399); }
  .seg-k { background: linear-gradient(90deg, #b8842f, #e3b85a); }
  .rev-legend { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .rev-leg { display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .leg-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .leg-label { color: var(--ink-2); flex: 1; }
  .leg-amt { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .leg-c .leg-swatch { background: var(--green); }
  .leg-k .leg-swatch { background: var(--gold); }
  .leg-r .leg-swatch { background: rgba(255,255,255,.10); border: 1px solid var(--line-2); }
  .leg-r .leg-amt { color: var(--ink-2); }

  /* -- Warm list -- */
  .warm-list { padding: 6px 6px 8px; }
  .warm-row { display: grid; grid-template-columns: 28px 1fr auto auto; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background .15s ease; }
  .warm-row:hover { background: rgba(255,255,255,.03); }
  .warm-init { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(160deg, var(--logo-a), var(--logo-b)); border: 1px solid var(--line-2); display: grid; place-items: center; font-size: 11px; font-weight: 700; color: var(--ink-2); font-family: 'JetBrains Mono', monospace; }
  .warm-name { font-size: 13px; color: var(--ink); font-weight: 500; line-height: 1.25; }
  .warm-name small { display: block; font-size: 11px; color: var(--ink-3); font-weight: 400; margin-top: 1px; }
  .warm-bar { width: 28px; height: 4px; border-radius: 2px; background: linear-gradient(90deg, rgba(96,165,250,.5), rgba(196,154,60,.5)); }

  /* -- Filters / pills -- */
  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
  .section-head h2 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: -.005em; }
  .filter-row { display: flex; gap: 6px; }
  .pill { font-size: 11px; padding: 5px 10px; border-radius: 999px; color: var(--ink-2); cursor: pointer; border: 1px solid var(--line); background: transparent; transition: all .15s; }
  .pill.on { background: var(--gold-soft); color: var(--gold); border-color: rgba(196,154,60,.30); }
  .pill:hover:not(.on) { color: var(--ink); border-color: var(--line-2); }

  /* -- Leads full table -- */
  .tbl-wrap { padding: 0 18px 18px; overflow-x: auto; }
  table.ltbl { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
  table.ltbl th { text-align: left; font-size: 11px; letter-spacing: .14em; color: var(--ink-3); font-weight: 500; padding: 10px 12px; border-bottom: 1px solid var(--line); }
  table.ltbl td { padding: 13px 12px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  table.ltbl tr:last-child td { border-bottom: none; }
  table.ltbl tr:hover td { background: rgba(255,255,255,.015); }
  table.ltbl tbody tr { cursor: pointer; }
  .tbl-name { font-weight: 600; }
  .tbl-org { font-size: 12px; color: var(--ink-3); margin-top: 2px; font-weight: 400; }
  .tbl-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--gold); }
  .tbl-days { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-3); }
  .tbl-action { color: var(--ink-2); max-width: 240px; white-space: normal; }

  /* -- Shoots page -- */
  .shoots-pg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .shoot-lg {
    background: linear-gradient(180deg, var(--card-2), var(--card));
    border: 1px solid var(--line); border-radius: 14px; padding: 22px;
    position: relative; overflow: hidden; cursor: pointer; transition: all .18s ease;
  }
  .shoot-lg:hover { transform: translateY(-2px); border-color: var(--line-2); }
  .shoot-lg .cd-num { font-family: 'JetBrains Mono', monospace; font-size: 56px; font-weight: 700; line-height: 1; color: var(--gold); letter-spacing: -.04em; }
  .shoot-lg .cd-lbl { font-size: 11px; color: var(--ink-3); letter-spacing: .22em; display: block; margin-top: 6px; font-weight: 500; }
  .shoot-lg .sc-title { font-size: 17px; font-weight: 700; margin-top: 18px; }
  .shoot-lg .sc-where { font-size: 13px; color: var(--ink-2); margin-top: 4px; }
  .shoot-lg .sc-foot { margin-top: 18px; padding-top: 14px; border-top: 1px dashed var(--line-2); display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--ink-3); }
  .shoot-lg .sc-val { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: var(--ink); }

/* ═══ Vault API ═══ */
function useVaultFile(path) {
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);
  useEffect(() => {
    let live = true;
    setLoading(true); setError(null);
    fetch('/api/vault?file=' + encodeURIComponent(path))
      .then(r => { if (!r.ok) throw new Error(`${r.status} ${r.statusText}`); return r.text(); })
      .then(t => { if (live) { setData(t); setLoading(false); } })
      .catch(e => { if (live) { setError(e.message); setLoading(false); } });
    return () => { live = false; };
  }, [path]);
  return { data, loading, error };
}

/* ═══ hot.md parser ═══ */
function parseHot(md) {
  if (!md) return null;
  const lines = md.split('\n');

  const top3 = [];
  let inTop = false;
  for (const l of lines) {
    if (/^##\s+Top 3/i.test(l))    { inTop = true; continue; }
    if (inTop && /^##\s/.test(l))  { inTop = false; }
    if (inTop) { const m = l.match(/^\d+\.\s+(.+)/); if (m) top3.push(m[1].trim()); }
  }

  function table(re) {
    const rows = []; let inSec = false, pastDiv = false;
    for (const l of lines) {
      if (re.test(l))               { inSec = true; pastDiv = false; continue; }
      if (inSec && /^##\s/.test(l)) { inSec = false; continue; }
      if (!inSec) continue;
      if (/^\|[-:\s|]+\|/.test(l)) { pastDiv = true; continue; }
      if (pastDiv && l.trim().startsWith('|')) {
        const cells = l.split('|').map(c => c.trim()).filter((_, i, a) => i > 0 && i < a.length - 1);
        if (cells.length >= 2) rows.push(cells);
      }
    }
    return rows;
  }

  const pipeline = table(/^##\s+HOT Pipeline/i).map(([name, action, value]) => ({
    name: name || '', action: action || '', value: value || '',
    numValue: parseFloat((value || '').replace(/[$,]/g, '')) || 0,
  }));

  const shoots = table(/^##\s+Upcoming Shoots/i).map(([date, job, value]) => ({
    date: date || '', job: job || '', value: value || '',
    numValue: parseFloat((value || '').replace(/[$,]/g, '')) || 0,
  }));

  const revSec = md.match(/##\s+Revenue[^\n]*([\s\S]*?)(?:\n##|$)/i)?.[1] || '';
  const n = s => parseFloat((s || '').replace(/[$,\s]/g, '')) || 0;
  const collected  = n(revSec.match(/Collected[^:]*:\s*(\$?[\d,]+)/i)?.[1]);
  const contracted = n(revSec.match(/Contracted[^:]*:\s*(\$?[\d,]+)/i)?.[1]);
  const goal       = n(revSec.match(/goal[^:]*:\s*(\$?[\d,]+)/i)?.[1]) || 10000;

  return { top3, pipeline, shoots, revenue: { collected, contracted, goal } };
}

function generatedGreeting() {
  const h = new Date().getHours();
  const time = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const d = new Date();
  return `Good ${time}, Bentley. Today is ${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}.`;
}

function parseChecklistFromHot(hotText) {
  const section = hotText.match(/## Top 3 Right Now\n([\s\S]*?)(?=\n##|$)/);
  if (!section) return null;
  const items = section[1]
    .split('\n')
    .filter(l => /^\d+\./.test(l.trim()))
    .map((line, i) => {
      const text = line.replace(/^\d+\.\s*/, '').trim();
      let category = 'PRIORITY';
      if (/URGENT|before May|before Jun|days away/i.test(text)) category = 'URGENT';
      else if (/DM|outreach|send|day 1/i.test(text))           category = 'OUTREACH';
      else if (/call|walk in|follow|text/i.test(text))          category = 'FOLLOW-UP';
      else if (/content|post|reel|story/i.test(text))           category = 'CONTENT';
      else if (/airtable|scout|pipeline|check/i.test(text))     category = 'PIPELINE';
      return { id: `hot-${i}`, category, text, meta: '' };
    });
  return items.length > 0 ? items : null;
}

function parseWarmFromHot(hotText) {
  if (!hotText) return null;
  const lines = hotText.split('\n');
  const rows = []; let inSec = false, pastDiv = false;
  for (const l of lines) {
    if (/^##\s+WARM\s+(Pipeline|Leads?)/i.test(l)) { inSec = true; pastDiv = false; continue; }
    if (inSec && /^##\s/.test(l)) { inSec = false; continue; }
    if (!inSec) continue;
    if (/^\|[-:\s|]+\|/.test(l)) { pastDiv = true; continue; }
    if (pastDiv && l.trim().startsWith('|')) {
      const cells = l.split('|').map(c => c.trim()).filter((_, i, a) => i > 0 && i < a.length - 1);
      if (cells.length >= 1 && cells[0]) rows.push(cells);
    }
  }
  if (!rows.length) return null;
  return rows.map(([name, sub]) => ({
    name: name || '',
    sub:  sub  || '',
    init: (name || '').split(/\s+/).map(w => w[0] || '').slice(0, 2).join('').toUpperCase(),
    heat: 0.5,
  }));
}

function daysUntil(dateStr) {
  const clean = dateStr.replace(/\s*[--].*/, '').trim();
  const year  = new Date().getFullYear();
  const d = new Date(`${clean} ${year}`);
  if (isNaN(d)) return null;
  const today = new Date(); today.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

/* ═══ Clock ═══ */
function useClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const id = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(id); }, []);
  return now;
}
function Clock() {
  const now  = useClock();
  const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  const date = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  return (
    <div className="clock-widget">
      <span style={{ color: 'var(--ink-3)' }}>{I.clock()}</span>
      <div style={{ display: 'flex', flexDirection: 'column', lineHeight: 1.1 }}>
        <span className="clock-t">{time}</span>
        <span className="clock-d">{date} · CST</span>
      </div>
    </div>
  );
}

/* ═══ Sparkline ═══ */
function Spark({ pts, color }) {
  const w = 140, h = 38;
  const min = Math.min(...pts), max = Math.max(...pts), rng = (max - min) || 1;
  const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${i / (pts.length - 1) * w} ${h - (p - min) / rng * h * 0.8 - 4}`).join(' ');
  const area = d + ` L ${w} ${h} L 0 ${h} Z`;
  const id = 'sg' + color.replace('#','');
  return (
    <svg className="spark-wrap" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity=".35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${id})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* ═══ Revenue bar (shared) ═══ */
function RevBar({ collected, contracted, goal }) {
  const total = collected + contracted;
  const cPct  = Math.min(collected / goal * 100, 100);
  const kPct  = Math.min(contracted / goal * 100, 100 - cPct);
  const rem   = Math.max(goal - total, 0);
  return (
    <div className="rev-wrap">
      <div className="rev-top-row">
        <div className="rev-big">{fmtMoney(total)}<span className="rev-of"> / {fmtMoney(goal)}</span></div>
        <span className="rev-pct-badge">{Math.round(total / goal * 100)}% to goal</span>
      </div>
      <div className="rev-bar">
        <div className="seg-c" style={{ width: `${cPct}%` }}></div>
        <div className="seg-k" style={{ width: `${kPct}%` }}></div>
      </div>
      <div className="rev-legend">
        <div className="rev-leg leg-c"><span className="leg-swatch"></span><span className="leg-label">Collected</span><span className="leg-amt">{fmtMoney(collected)}</span></div>
        <div className="rev-leg leg-k"><span className="leg-swatch"></span><span className="leg-label">Contracted (pending invoice)</span><span className="leg-amt">{fmtMoney(contracted)}</span></div>
        <div className="rev-leg leg-r"><span className="leg-swatch"></span><span className="leg-label">Remaining to goal</span><span className="leg-amt">{fmtMoney(rem)}</span></div>
      </div>
    </div>
  );
}

function CopyBtn({ text, label = 'Copy', className = 'copy-btn' }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return <button className={className} onClick={copy}>{I.copy()} {copied ? 'Copied!' : label}</button>;
}

function BaseModal({ onClose, title, children, foot }) {
  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [onClose]);
  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-head">
          <h3>{title}</h3>
          <div className="modal-close" onClick={onClose}>{I.x()}</div>
        </div>
        <div className="modal-body">{children}</div>
        {foot && <div className="modal-foot">{foot}</div>}
      </div>
    </div>
  );
}

    <div className="panel" style={allDone ? { boxShadow: '0 0 0 1px rgba(196,154,60,.45), 0 12px 30px rgba(196,154,60,.08), 0 2px 8px rgba(0,0,0,.25)' } : {}}>

          <h3>Daily Checklist</h3>

        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span className="ph-meta">{new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</span>
          <button className="reset-btn" onClick={e => { e.stopPropagation(); onReset(); }}>Reset</button>
        </div>
      </div>
      <div className="dc-progress-wrap">
        <div className="dc-progress-label"><span>Progress</span><span>{done} / {total} complete</span></div>
        <div className="dc-progress-bar"><div className="dc-progress-fill" style={{ width: total > 0 ? `${done / total * 100}%` : '0%' }}></div></div>
      </div>
      <div className="dc-list">
        {items.map(c => (
          <div key={c.id} className={'dc-row ' + (checks[c.id] ? 'done' : '')} onClick={() => onToggle(c.id)}>
            <div className="dc-chk">{checks[c.id] && I.check()}</div>
            <div className="dc-body">
              <div className="dc-text">{c.text}</div>
              {c.meta && <div className="dc-meta">{c.meta}</div>}
            </div>
            <span className={`cat-badge cat-${c.category.toLowerCase().replace(/\s+/g, '-')}`}>{c.category}</span>
          </div>
        ))}
      </div>
    </div>
  );

// FALLBACK — update via hot.md WARM Pipeline section
const WARM_PIPELINE = [
  { name: 'Ozark BBQ',       sub: 'Brand film · referral',  init: 'OB', heat: .55 },
  { name: 'Cliff House Inn', sub: 'Hospitality reel',        init: 'CH', heat: .70 },
  { name: 'Low Gap Cafe',    sub: 'Menu + ambience video',   init: 'LG', heat: .40 },
];

function DashPage({ openModal }) {
  const { data: raw, loading, error } = useVaultFile('hot.md');
  const parsed = raw ? parseHot(raw) : null;
  const d      = parsed || FB;

  const pipeVal = d.pipeline.reduce((s, l) => s + l.numValue, 0);
  const next    = d.shoots[0];
  const nextD   = next ? daysUntil(next.date) : null;
  const goalPct = Math.round((d.revenue.collected + d.revenue.contracted) / d.revenue.goal * 100);

  const [done, setDone] = useState({});
  const toggle = i => setDone(s => ({ ...s, [i]: !s[i] }));

  // Daily Checklist: live from hot.md Top 3, fallback to DAILY_CHECKLIST
  const [checklistItems, setChecklistItems] = useState(DAILY_CHECKLIST);
  useEffect(() => {
    if (raw) {
      const live = parseChecklistFromHot(raw);
      if (live) setChecklistItems(live);
    }
  }, [raw]);

  const [clChecks, setClChecks] = useState({});
  const clToggle = id => setClChecks(s => ({ ...s, [id]: !s[id] }));
  const clReset  = () => setClChecks({});
  const clDone = checklistItems.filter(c => clChecks[c.id]).length;
  const clRem  = checklistItems.length - clDone;

  // Warm Pipeline: live from hot.md WARM section, fallback to constant
  const warmPipeline = raw ? (parseWarmFromHot(raw) || WARM_PIPELINE) : WARM_PIPELINE;

  // Expandable briefing strip
  const [briefingData, setBriefingData] = useState(null);
  const [briefingOpen, setBriefingOpen] = useState(false);
  useEffect(() => {
    fetch('/api/vault?file=' + encodeURIComponent('daily/briefing.md'))
      .then(r => r.ok ? r.text() : null)
      .catch(() => null)
      .then(text => {
        if (text) {
          const lines = text.trim().split('\n').filter(l => l.trim());
          setBriefingData({ greeting: lines[0] || '', full: text.trim() });
        }
      });
  }, []);

  return (
    <>
      <div className="topbar">
        <div>
          <div className="crumb">
            <span>Workspace · Command Center</span>
            <span className="live-badge"><span className="pulse"></span>LIVE</span>
          </div>
          <h1 className="page-title">Command Center</h1>
        </div>
        <div className="top-right">
          <Clock/>
          <button className="icon-btn">{I.search()}</button>
          <button className="icon-btn">{I.bell()}<span className="notif-dot"></span></button>
          <button className="new-btn">{I.plus()} New Lead</button>
        </div>
      </div>

      {error   && <div className="err-banner">Vault fetch failed: {error}. Showing cached data.</div>}
      {loading && <div className="load-note"><span className="pulse"></span>Fetching live vault data...</div>}

      {/* Stats */}
      <div className="stat-grid">
        <div className="stat s-green" onClick={() => openModal({ type: 'stat', data: 'collected' })}>
          <div className="stat-row1">
            <div><div className="stat-label">Revenue Collected · May</div><div className="stat-value">{fmtMoney(d.revenue.collected)}</div></div>
            <div className="stat-badge">{I.dollar()}</div>
          </div>
          <div className="stat-delta d-green">{I.trendUp({ style: { color: 'var(--green)' } })} <b>{fmtMoney(d.revenue.collected)}</b> collected this month</div>
          <Spark pts={[10,12,9,14,18,16,22,28,34]} color="#34d399"/>
        </div>

        <div className="stat s-blue" onClick={() => openModal({ type: 'stat', data: 'pipeline' })}>
          <div className="stat-row1">
            <div><div className="stat-label">Pipeline Value</div><div className="stat-value">{fmtMoney(pipeVal)}</div></div>
            <div className="stat-badge">{I.flame()}</div>
          </div>
          <div className="stat-delta d-blue"><b>{d.pipeline.length} active leads</b> · all HOT</div>
          <Spark pts={[18,22,20,28,26,30,34,32,38]} color="#60a5fa"/>
        </div>

        <div className="stat s-gold" onClick={() => { const sd = SHOOT_DETAIL[next ? next.job : '']; if (sd) openModal({ type: 'shoot', data: sd }); }}>
          <div className="stat-row1">
            <div>
              <div className="stat-label">Next Shoot</div>
              <div className="stat-value">{nextD !== null ? nextD : '--'}<span className="stat-unit">days</span></div>
            </div>
            <div className="stat-badge">{I.cam()}</div>
          </div>
          <div className="stat-delta d-gold"><b>{next ? next.job : '--'}</b> · {next ? next.date : '--'}</div>
          <Spark pts={[40,32,28,24,20,18,14,10,8]} color="#c49a3c"/>
        </div>

        <div className="stat s-orange" onClick={() => openModal({ type: 'stat', data: 'goal' })}>
          <div className="stat-row1">
            <div><div className="stat-label">Monthly Goal</div><div className="stat-value">{goalPct}<span className="stat-unit">%</span></div></div>
            <div className="stat-badge">{I.target()}</div>
          </div>
          <div className="stat-delta d-orange"><b>{fmtMoney(Math.max(d.revenue.goal - d.revenue.collected - d.revenue.contracted, 0))}</b> remaining to {fmtMoney(d.revenue.goal)}</div>
          <Spark pts={[2,3,4,4,5,6,7,7,Math.max(goalPct/10,1)]} color="#f59e0b"/>
        </div>
      </div>

      {/* Expandable briefing strip */}
      <div
        onClick={() => setBriefingOpen(o => !o)}
        style={{
          background: 'var(--card)', borderLeft: '3px solid var(--gold)', borderRadius: '8px',
          padding: '12px 16px', cursor: 'pointer', display: 'flex',
          justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px'
        }}
      >
        <span style={{ fontStyle: 'italic', color: 'var(--ink-2)', fontSize: '0.9rem' }}>
          {briefingData?.greeting || generatedGreeting()}
        </span>
        <span style={{ color: 'var(--gold)', fontSize: '0.75rem', marginLeft: '12px', flexShrink: 0 }}>
          {briefingOpen ? '▲ Close' : '▼ Full briefing'}
        </span>
      </div>
      {briefingOpen && briefingData && (
        <div style={{
          background: 'var(--card)', borderRadius: '8px', padding: '16px 20px', marginBottom: '16px',
          borderLeft: '3px solid var(--gold)', whiteSpace: 'pre-wrap',
          fontFamily: "'JetBrains Mono', monospace", fontSize: '0.82rem', lineHeight: '1.7', color: 'var(--ink-2)'
        }}>
          {briefingData.full}
        </div>
      )}

      {/* Body */}
      <div className="body-grid">
        <div className="stack">
          {/* Pipeline */}
          <div className="panel">
            <div className="panel-head">
              <h3>Pipeline Snapshot</h3>
              <span className="ph-link">View all {I.arrow({ width: 11, height: 11 })}</span>
            </div>
            <div className="lead-grid">
              {d.pipeline.map((l, i) => {
                const hl = matchHotLead(l.name);
                return (
                  <div key={i} className="lead-card" onClick={() => { if (hl) openModal({ type: 'lead', data: hl }); }}>
                    <div className="lead-top">
                      <div><div className="lead-name">{l.name}</div><div className="lead-sub">HOT lead</div></div>
                      <span className="badge-hot"><span className="ember"></span>HOT</span>
                    </div>
                    <div className="lead-actions-row">
                      <div><span className="lead-action-lbl">NEXT ACTION</span><span className="lead-action-text">{l.action}</span></div>
                      <div className="lead-value">{l.value}</div>
                    </div>
                    <div className="lead-meta"><span>{I.target({ width: 11, height: 11 })} <b>Active</b></span></div>
                  </div>
                );
              })}
            </div>
          </div>

          <DailyChecklist items={checklistItems} checks={clChecks} onToggle={clToggle} onReset={clReset}/>

          {/* Shoots */}
          <div className="panel">
            <div className="panel-head">
              <h3>Upcoming Shoots</h3>
              <span className="ph-link">Full calendar {I.arrow({ width: 11, height: 11 })}</span>
            </div>
            <div className="shoots-row">
              {d.shoots.map((s, i) => {
                const days = daysUntil(s.date);
                const sd   = SHOOT_DETAIL[s.job];
                return (
                  <div key={i} className="shoot-sm" onClick={() => { if (sd) openModal({ type: 'shoot', data: sd }); }}>
                    <div className="shoot-cd">{days !== null ? String(days).padStart(2,'0') : '--'}<span className="shoot-cd-lbl">DAYS OUT</span></div>
                    <div className="shoot-title">{s.job}</div>
                    <div className="shoot-where">{s.date}</div>
                    <div className="shoot-foot">
                      <span>{I.cam({ width: 13, height: 13, style: { verticalAlign: '-2px' } })} Scheduled</span>
                      <span className="shoot-net">{s.value || '--'}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* Right column */}
        <div className="right-col">
          {/* Top 3 */}
          <div className="panel">
            <div className="panel-head"><h3>Top 3 Priorities</h3><span className="ph-meta">TODAY</span></div>
            <div className="priorities-list">
              {d.top3.map((t, i) => (
                <div key={i} className={'pri ' + (done[i] ? 'done' : '')}>
                  <div className="pri-num">{i + 1}</div>
                  <div className={'chk ' + (done[i] ? 'on' : '')} onClick={() => toggle(i)}>{I.check()}</div>
                  <div className="pri-body"><div className="pri-text">{t}</div></div>
                </div>
              ))}
            </div>
          </div>

          {/* Revenue */}
          <div className="panel">
            <div className="panel-head"><h3>Revenue · May 2026</h3><span className="ph-meta">MTD</span></div>
            <RevBar collected={d.revenue.collected} contracted={d.revenue.contracted} goal={d.revenue.goal}/>
          </div>

          {/* Warm pipeline — live from hot.md WARM section */}
          <div className="panel">
            <div className="panel-head">
              <h3>Warm Pipeline</h3>
              <span className="ph-link">{I.plus({ width: 12, height: 12 })} Add</span>
            </div>
            <div className="warm-list">
              {warmPipeline.map((wr, i) => {
                const wd = WARM_DETAIL_MAP[wr.name];
                return (
                  <div key={i} className="warm-row" onClick={() => { if (wd) openModal({ type: 'warm', data: wd }); }}>
                    <div className="warm-init">{wr.init}</div>
                    <div className="warm-name">{wr.name}<small>{wr.sub}</small></div>
                    <div className="warm-bar" style={{ opacity: wr.heat }}></div>
                    <span style={{ color: 'var(--ink-3)' }}>{I.chev()}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

function LeadsPage({ openModal }) {

          <table className="ltbl">
            <thead>
              <tr>
                <th>Lead</th>
                <th>Stage</th>
                <th>Value</th>
                <th>Next Action</th>
                <th className="col-lc">Last Contact</th>
              </tr>
            </thead>
            <tbody>
              {shown.map((l, i) => (
                <tr key={i} onClick={() => handleRowClick(l)}>
                  <td>
                    <div className="tbl-name">{l.name}</div>
                    {l.org && <div className="tbl-org">{l.org}</div>}
                  </td>
                  <td>
                    {l.stage === 'HOT'
                      ? <span className="badge-hot"><span className="ember"></span>HOT</span>
                      : <span className="badge-warm">WARM</span>}

                  <td><span className="tbl-action">{l.action}</span></td>
                  <td className="col-lc"><span className="tbl-days">{l.lastContact}d ago</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </>
  );
}

function SkillsPage() {
  const [modal, setModal]   = useState(null);
  const [copied, setCopied] = useState(false);
  const [running, setRunning] = useState({});
  const [ran, setRan]         = useState({});
  const [researchOpen,   setResearchOpen]   = useState(false);
  const [researchBiz,    setResearchBiz]    = useState('');
  const [researchStatus, setResearchStatus] = useState(null); // null | 'running' | 'done' | 'error'

  const openModal = s => { setModal(s); setCopied(false); };
  const close     = () => setModal(null);
  const copy      = () => {
    navigator.clipboard.writeText(modal.prompt).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const runLeadResearch = async (biz) => {
    if (!biz.trim() || researchStatus === 'running') return;
    setResearchStatus('running');
    try {
      await fetch('/api/trigger', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ workflow: 'lead-research', payload: { businessName: biz.trim() } }),
      });
      setResearchStatus('done');
      setTimeout(() => { setResearchStatus(null); setResearchOpen(false); setResearchBiz(''); }, 3000);
    } catch {
      setResearchStatus('error');
      setTimeout(() => setResearchStatus(null), 3000);
    }
  };

  const handleCardClick = async (s, i) => {
    if (s.workflow === 'lead-research') {
      setResearchOpen(o => !o);
      return;
    }
    if (s.workflow) {
      if (running[i]) return;
      setRunning(r => ({ ...r, [i]: true }));
      try {
        await fetch('/api/trigger', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ workflow: s.workflow }),
        });
      } catch {}
      setRunning(r => ({ ...r, [i]: false }));
      setRan(r => ({ ...r, [i]: true }));
      setTimeout(() => setRan(r => ({ ...r, [i]: false })), 3000);
    } else {
      openModal(s);
    }
  };

  return (
    <>
      <div className="topbar">
        <div>
          <div className="crumb"><span>Workspace · Skills</span></div>
          <h1 className="page-title">Skills</h1>
          <div className="subtitle">AI prompt templates for Bray Films. Click any card to copy into Claude.</div>
        </div>
        <div className="top-right"><Clock/></div>
      </div>

      <div className="skills-grid">
        {SKILLS.map((s, i) => (
          <div key={i} className="skill-card" onClick={() => handleCardClick(s, i)}>
            <div className="sk-icon">{I[s.icon]()}</div>
            <div className="sk-title">{s.title}</div>
            <div className="sk-desc">{s.desc}</div>
            {s.workflow === 'lead-research'
              ? researchOpen
                ? <div onClick={e => e.stopPropagation()} style={{ marginTop: 10 }}>
                    <input
                      type="text"
                      value={researchBiz}
                      onChange={e => setResearchBiz(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && runLeadResearch(researchBiz)}
                      placeholder="Business name..."
                      style={{ width: '100%', padding: '6px 10px', borderRadius: 6, border: '1px solid var(--line)', background: 'var(--bg)', color: 'var(--ink)', fontSize: 13, marginBottom: 8, boxSizing: 'border-box' }}
                    />
                    <button
                      onClick={() => runLeadResearch(researchBiz)}
                      disabled={!researchBiz.trim() || researchStatus === 'running'}
                      style={{ width: '100%', padding: '7px 0', borderRadius: 6, border: 'none', background: 'var(--gold)', color: '#000', fontSize: 12, fontWeight: 700, cursor: 'pointer', letterSpacing: '.08em', opacity: !researchBiz.trim() ? 0.5 : 1 }}
                    >
                      {researchStatus === 'running' ? 'Running...' : researchStatus === 'done' ? 'Done!' : researchStatus === 'error' ? 'Error — retry' : 'Research'}
                    </button>
                  </div>
                : <span className="sk-arrow" style={{ color: researchStatus === 'done' ? 'var(--green)' : 'var(--ink-3)', fontSize: 11, letterSpacing: '.08em' }}>
                    {researchStatus === 'done' ? 'Done!' : I.arrow()}
                  </span>
              : s.workflow
                ? <span className="sk-arrow" style={{ color: running[i] ? 'var(--gold)' : ran[i] ? 'var(--green)' : 'var(--ink-3)', fontSize: 11, letterSpacing: '.08em' }}>
                    {running[i] ? 'Running...' : ran[i] ? 'Done!' : I.arrow()}
                  </span>
                : <span className="sk-arrow">{I.chev()}</span>}
          </div>
        ))}
      </div>

      {modal && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && close()}>
          <div className="modal">
            <div className="modal-head">
              <h3>{modal.title}</h3>
              <div className="modal-close" onClick={close}>{I.x()}</div>
            </div>
            <div className="modal-body">
              <div className="modal-prompt">{modal.prompt}</div>
            </div>
            <div className="modal-foot">
              <button className="cancel-btn" onClick={close}>Close</button>
              <button className="copy-btn" onClick={copy}>{I.copy()} {copied ? 'Copied!' : 'Copy Prompt'}</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function CalendarPage({ go }) {
  const [shoots,   setShoots]  = useState([]);
  const [loading,  setLoading] = useState(true);
  const [view,     setView]    = useState(() => { const n = new Date(); return { year: n.getFullYear(), month: n.getMonth() }; });
  const [selected, setSelected] = useState(null);

  useEffect(() => {
    fetch('/api/calendar?days=120')
      .then(r => r.ok ? r.json() : [])
      .catch(() => [])
      .then(data => { setShoots(data); setLoading(false); });
  }, []);

  useEffect(() => { setSelected(null); }, [view]);

  const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAY_HDRS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const { year, month } = view;

  const byDate = {};
  shoots.forEach(s => { if (!byDate[s.date]) byDate[s.date] = []; byDate[s.date].push(s); });

  const mkDate = (y, m, d) => `${y}-${String(m + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const firstDow    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const prevDays    = new Date(year, month, 0).getDate();
  const todayStr    = new Date().toISOString().split('T')[0];

  const cells = [];
  for (let i = firstDow - 1; i >= 0; i--)
    cells.push({ day: prevDays - i, dateStr: mkDate(month === 0 ? year - 1 : year, month === 0 ? 11 : month - 1, prevDays - i), outside: true });
  for (let d = 1; d <= daysInMonth; d++)
    cells.push({ day: d, dateStr: mkDate(year, month, d), outside: false });
  const tail = (7 - (cells.length % 7)) % 7;
  for (let d = 1; d <= tail; d++)
    cells.push({ day: d, dateStr: mkDate(month === 11 ? year + 1 : year, month === 11 ? 0 : month + 1, d), outside: true });

  const thisMonthShoots = shoots.filter(s => s.date.startsWith(`${year}-${String(month + 1).padStart(2,'0')}`));
  const prevMonth = () => setView(({ year: y, month: m }) => m === 0 ? { year: y - 1, month: 11 } : { year: y, month: m - 1 });
  const nextMonth = () => setView(({ year: y, month: m }) => m === 11 ? { year: y + 1, month: 0 } : { year: y, month: m + 1 });

  return (
    <>
      <div className="topbar">
        <div>
          <div className="crumb"><span>Tools · Calendar</span></div>
          <h1 className="page-title">Calendar</h1>
          <div className="subtitle">
            {loading ? '--' : <em>{thisMonthShoots.length} shoot{thisMonthShoots.length !== 1 ? 's' : ''}</em>} scheduled this month.
          </div>
        </div>
        <div className="top-right"><Clock/></div>
      </div>

      {/* Month navigator */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 20 }}>
        <button onClick={prevMonth} style={{ background: 'none', border: '1px solid var(--line)', color: 'var(--ink-2)', borderRadius: 6, padding: '4px 14px', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>&#8249;</button>
        <span style={{ fontWeight: 700, fontSize: 15, color: 'var(--gold)', minWidth: 150, textAlign: 'center', letterSpacing: '.06em' }}>
          {MONTHS[month]} {year}
        </span>
        <button onClick={nextMonth} style={{ background: 'none', border: '1px solid var(--line)', color: 'var(--ink-2)', borderRadius: 6, padding: '4px 14px', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>&#8250;</button>
      </div>

      {/* Grid + optional detail panel */}
      <div style={{ display: 'grid', gridTemplateColumns: selected ? '1fr 260px' : '1fr', gap: 20, alignItems: 'start' }}>
        <div>
          {/* Day-of-week headers */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3, marginBottom: 3 }}>
            {DAY_HDRS.map(d => (
              <div key={d} style={{ textAlign: 'center', fontSize: 10, fontWeight: 600, letterSpacing: '.14em', color: 'var(--ink-3)', padding: '4px 0' }}>{d}</div>
            ))}
          </div>

          {/* Day cells */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3 }}>
            {cells.map((cell, i) => {
              const cellShoots = byDate[cell.dateStr] || [];
              const hasShoot   = cellShoots.length > 0 && !cell.outside;
              const isToday    = cell.dateStr === todayStr;
              return (
                <div
                  key={i}
                  onClick={() => hasShoot && setSelected(cellShoots[0])}
                  style={{
                    background: hasShoot ? 'rgba(196,154,60,0.08)' : 'var(--card)',
                    border: isToday ? '1px solid var(--gold)' : hasShoot ? '1px solid rgba(196,154,60,0.30)' : '1px solid var(--line)',
                    borderRadius: 8, padding: '6px 7px', minHeight: 72,
                    opacity: cell.outside ? 0.3 : 1,
                    cursor: hasShoot ? 'pointer' : 'default',
                    transition: 'border-color .15s',
                  }}
                >
                  <div style={{ fontSize: 11, color: isToday ? 'var(--gold)' : 'var(--ink-3)', fontFamily: "'JetBrains Mono', monospace", marginBottom: 4, fontWeight: isToday ? 700 : 400 }}>
                    {cell.day}
                  </div>
                  {cellShoots.map((s, j) => (
                    <div key={j} style={{ background: 'rgba(196,154,60,0.15)', border: '1px solid rgba(196,154,60,0.35)', borderRadius: 4, padding: '2px 5px', fontSize: 9.5, fontWeight: 600, color: 'var(--gold)', marginBottom: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      {s.title}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>

          {/* Empty state */}
          {!loading && thisMonthShoots.length === 0 && (
            <div style={{ textAlign: 'center', color: 'var(--ink-2)', padding: '32px 0', fontSize: 13 }}>
              {I.cal()} No shoots scheduled this month.
            </div>
          )}
        </div>

        {/* Detail panel */}
        {selected && (
          <div style={{ background: 'var(--card)', border: '1px solid var(--line)', borderRadius: 8, padding: 20 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
              <span style={{ fontSize: 10, letterSpacing: '.12em', color: 'var(--gold)', textTransform: 'uppercase', fontWeight: 700 }}>Shoot Detail</span>
              <button onClick={() => setSelected(null)} style={{ background: 'none', border: 'none', color: 'var(--ink-3)', cursor: 'pointer', padding: 0, display: 'flex' }}>{I.x()}</button>
            </div>
            <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--ink)', marginBottom: 6 }}>{selected.title}</div>
            <div style={{ fontSize: 12, color: 'var(--ink-2)', marginBottom: 2 }}>{selected.dateFormatted}</div>
            <div style={{ fontSize: 11, color: selected.daysOut === 0 ? 'var(--gold)' : 'var(--ink-3)', marginBottom: 10, fontWeight: selected.daysOut === 0 ? 700 : 400 }}>
              {selected.daysOut === 0 ? 'Today' : `${selected.daysOut} day${selected.daysOut !== 1 ? 's' : ''} out`}
            </div>
            {selected.location && <div style={{ fontSize: 12, color: 'var(--ink-2)', marginBottom: 6 }}>{selected.location}</div>}
            {selected.value && <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 14, color: 'var(--gold)', fontWeight: 700, marginBottom: 10 }}>{selected.value}</div>}
            {selected.description && <div style={{ fontSize: 12, color: 'var(--ink-2)', lineHeight: 1.6, marginBottom: 14 }}>{selected.description}</div>}
            <button
              onClick={() => go('shoots')}
              style={{ background: 'none', border: '1px solid var(--line)', color: 'var(--ink-2)', borderRadius: 6, padding: '6px 12px', cursor: 'pointer', fontSize: 12, width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4 }}
            >
              View in Shoots {I.arrow({ width: 11, height: 11 })}
            </button>
          </div>
        )}
      </div>
    </>
  );
}

/* ════════════════════════════════════════════
   Bottom Tab Bar (mobile only)
════════════════════════════════════════════ */
const TAB_BAR = [
  { id: 'dash',    label: 'Home',    icon: 'grid'   },
  { id: 'leads',   label: 'Leads',   icon: 'flame'  },
  { id: 'shoots',  label: 'Shoots',  icon: 'cam'    },
  { id: 'revenue', label: 'Revenue', icon: 'dollar' },
  { id: 'skills',  label: 'Skills',  icon: 'award'  },
];
function BottomTabBar({ active, go }) {
  return (
    <nav className="bottom-tab-bar">
      {TAB_BAR.map(t => (
        <button key={t.id} className={'tab-btn ' + (active === t.id ? 'active' : '')} onClick={() => go(t.id)}>
          {I[t.icon]({ width: 20, height: 20 })}
          <span className="tab-label-sm">{t.label}</span>
        </button>
      ))}
    </nav>
  );
}

/* ════════════════════════════════════════════
   Root App
════════════════════════════════════════════ */
function App() {
  const [page, setPage]   = useState('dash');
  const [modal, setModal] = useState(null);
  const { data: hotRaw, loading: hotLoading } = useVaultFile('hot.md');
  const leadCount = React.useMemo(() => {
    if (hotLoading) return '…';
    if (!hotRaw) return null;
    const parsed = parseHot(hotRaw);
    return parsed ? String(parsed.pipeline.length) : null;
  }, [hotRaw, hotLoading]);
  const openModal  = data => setModal(data);
  const closeModal = ()   => setModal(null);

  const content = {
    dash:       <DashPage       openModal={openModal}/>,
    leads:      <LeadsPage      openModal={openModal}/>,
    meta:       <MetaAdsPage/>,
    publishing: <PublishingPage/>,
    shoots:     <ShootsPage     openModal={openModal}/>,
    revenue:    <RevenuePage    openModal={openModal}/>,
    skills:     <SkillsPage/>,
    calendar:   <CalendarPage   go={setPage}/>,
  }[page];

  return (
    <div className="app">
      <Sidebar active={page} go={setPage} leadCount={leadCount}/>
      <main>{content}</main>
      <ModalManager modal={modal} onClose={closeModal}/>
      <BottomTabBar active={page} go={setPage}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
