<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Bray Films · Studio OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0e10;
    --bg-2: #141416;
    --sidebar: #08080a;
    --card: #18181b;
    --card-2: #1f1f23;
    --line: rgba(255,255,255,.06);
    --line-2: rgba(255,255,255,.10);
    --ink: #ececee;
    --ink-2: #a8a8ad;
    --ink-3: #6b6b73;
    --gold: #c49a3c;
    --gold-2: #e3b85a;
    --gold-soft: rgba(196,154,60,.14);
    --green: #34d399;
    --blue: #60a5fa;
    --orange: #f59e0b;
    --red: #ef4444;
    --shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 12px 30px rgba(0,0,0,.35), 0 2px 8px rgba(0,0,0,.25);
    --logo-a: #25252a;
    --logo-b: #131316;
    --pill-a: #1c1c20;
    --pill-b: #131316;
    --ambient-1: rgba(196,154,60,.06);
    --ambient-2: rgba(255,255,255,.025);
    --pad: 26px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, var(--ambient-1), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, var(--ambient-2), transparent 60%),
      var(--bg);
    min-height: 100vh;
  }

  /* -- Layout -- */
  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .sidebar {
    background: var(--sidebar);
    border-right: 1px solid var(--line);
    padding: 22px 16px 16px;
    display: flex; flex-direction: column; gap: 22px;
    position: sticky; top: 0; height: 100vh; overflow: hidden;
  }
  .logo { display: flex; align-items: center; gap: 10px; padding: 4px 8px 16px; border-bottom: 1px solid var(--line); }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 9px;
    background: linear-gradient(160deg, var(--logo-a), var(--logo-b));
    border: 1px solid var(--line-2);
    display: grid; place-items: center;
    box-shadow: 0 0 0 1px rgba(196,154,60,.18) inset, 0 8px 20px rgba(196,154,60,.10);
  }
  .logo-mark svg { color: var(--gold); }
  .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
  .logo-text b { font-size: 13px; letter-spacing: .14em; }
  .logo-text small { font-size: 10px; color: var(--ink-3); letter-spacing: .22em; text-transform: uppercase; }

  .nav-section { display: flex; flex-direction: column; gap: 2px; }
  .nav-label { font-size: 10px; letter-spacing: .22em; color: var(--ink-3); padding: 8px 10px; text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px; border-radius: 8px;
    color: var(--ink-2); font-size: 13.5px; font-weight: 500;
    cursor: pointer; user-select: none; position: relative;
    transition: all .15s ease;
  }
  .nav-item:hover { background: rgba(255,255,255,.03); color: var(--ink); }
  .nav-item.active {
    background: linear-gradient(180deg, rgba(196,154,60,.14), rgba(196,154,60,.06));
    color: #fff;
    box-shadow: inset 0 0 0 1px rgba(196,154,60,.25);
  }
  .nav-item.active::before {
    content: ""; position: absolute; left: -16px; top: 8px; bottom: 8px; width: 3px;
    background: var(--gold); border-radius: 0 3px 3px 0;
  }
  .nav-item.active .nav-ic { color: var(--gold); }
  .nav-ic { width: 18px; height: 18px; color: var(--ink-3); display: grid; place-items: center; }

  .sidebar-foot { margin-top: auto; }
  .profile-pill {
    display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px;
    background: linear-gradient(180deg, var(--pill-a), var(--pill-b));
    border: 1px solid var(--line-2);
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #c49a3c 0%, #6d4f1c 100%);
    color: #0b1220; font-weight: 700; font-size: 13px;
    display: grid; place-items: center;
    box-shadow: 0 0 0 2px rgba(196,154,60,.15);
  }
  .who { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
  .who b { font-size: 13px; color: var(--ink); }
  .who small { font-size: 11px; color: var(--ink-3); }
  .online-dot { margin-left: auto; width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }

  /* -- Main -- */
  main { padding: var(--pad) calc(var(--pad) + 6px) 48px; min-width: 0; overflow-y: auto; max-height: 100vh; }
  .topbar { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 28px; }
  .crumb { font-size: 11px; letter-spacing: .22em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .live-badge { display: inline-flex; align-items: center; gap: 6px; color: var(--green); }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.6)} 50%{box-shadow:0 0 0 6px rgba(52,211,153,0)} }
  h1.page-title { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .subtitle { color: var(--ink-2); font-size: 14px; margin-top: 6px; }
  .subtitle em { color: var(--gold); font-style: normal; font-weight: 600; }
  .top-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .clock-widget {
    background: var(--card); border: 1px solid var(--line);
    padding: 10px 14px; border-radius: 10px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow);
  }
  .clock-t { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; letter-spacing: .03em; }
  .clock-d { font-size: 11px; color: var(--ink-3); letter-spacing: .12em; text-transform: uppercase; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--card); border: 1px solid var(--line);
    display: grid; place-items: center; color: var(--ink-2);
    cursor: pointer; position: relative; box-shadow: var(--shadow);
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--line-2); }
  .notif-dot { position: absolute; top: 9px; right: 9px; width: 7px; height: 7px; border-radius: 50%; background: var(--red); box-shadow: 0 0 0 2px var(--card); }
  .new-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(180deg, var(--gold-2), var(--gold));
    color: #1a1305; font-weight: 600; font-size: 13px;
    padding: 10px 14px; border-radius: 10px; border: 0; cursor: pointer;
    box-shadow: 0 6px 14px rgba(196,154,60,.30), inset 0 1px 0 rgba(255,255,255,.25);
  }

  /* -- Stat cards -- */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 24px; }
  .stat {
    background: linear-gradient(180deg, var(--card), var(--bg-2));
    border: 1px solid var(--line); border-radius: 14px; padding: 18px;
    box-shadow: var(--shadow); position: relative; overflow: hidden;
    transition: transform .15s ease, border-color .15s ease;
    cursor: pointer;
  }
  .stat:hover { transform: translateY(-2px); border-color: var(--line-2); }
  .stat-row1 { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .stat-label { font-size: 12px; color: var(--ink-2); letter-spacing: .04em; }
  .stat-value { font-size: 32px; font-weight: 700; letter-spacing: -.02em; margin-top: 10px; line-height: 1; font-family: 'JetBrains Mono', monospace; }
  .stat-unit { font-size: 18px; color: var(--ink-2); font-weight: 500; margin-left: 4px; }
  .stat-delta { margin-top: 12px; font-size: 12px; color: var(--ink-2); display: flex; align-items: center; gap: 6px; }
  .stat-delta b { font-weight: 600; }
  .stat-badge {
    width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; flex-shrink: 0;
    background: var(--sb-soft, rgba(255,255,255,.05)); color: var(--sb-c, var(--ink));
    box-shadow: inset 0 0 0 1px var(--sb-line, var(--line-2));
  }
  .stat.s-green { --sb-c: var(--green); --sb-soft: rgba(52,211,153,.12); --sb-line: rgba(52,211,153,.25); }
  .stat.s-blue  { --sb-c: var(--blue);  --sb-soft: rgba(96,165,250,.12); --sb-line: rgba(96,165,250,.25); }
  .stat.s-gold  { --sb-c: var(--gold);  --sb-soft: rgba(196,154,60,.16); --sb-line: rgba(196,154,60,.30); }
  .stat.s-orange{ --sb-c: var(--orange);--sb-soft: rgba(245,158,11,.12); --sb-line: rgba(245,158,11,.25); }
  .stat-delta.d-green b { color: var(--green); }
  .stat-delta.d-blue  b { color: var(--blue); }
  .stat-delta.d-gold  b { color: var(--gold); }
  .stat-delta.d-orange b { color: var(--orange); }
  .spark-wrap { position: absolute; right: 0; bottom: 0; opacity: .35; pointer-events: none; }

  /* -- Two-column body -- */
  .body-grid { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 22px; }
  .stack { display: flex; flex-direction: column; gap: 22px; }
  .right-col { display: flex; flex-direction: column; gap: 22px; }

  /* -- Panel -- */
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--line); }
  .panel-head h3 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: -.005em; }
  .ph-meta { font-size: 11px; color: var(--ink-3); letter-spacing: .12em; text-transform: uppercase; }
  .ph-link { font-size: 12px; color: var(--ink-2); cursor: pointer; }
  .ph-link:hover { color: var(--gold); }
  .ph-right { display: flex; gap: 8px; align-items: center; }

  /* -- Pipeline grid -- */
  .lead-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
  .lead-card {
    background: linear-gradient(180deg, var(--card-2), var(--card));
    border: 1px solid var(--line); border-radius: 12px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
    cursor: pointer; transition: all .18s ease; position: relative; overflow: hidden;
  }
  .lead-card:hover { border-color: rgba(196,154,60,.35); transform: translateY(-1px); }
  .lead-card::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(400px 120px at 100% 0%, rgba(196,154,60,.06), transparent 60%);
  }
  .lead-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .lead-name { font-size: 15px; font-weight: 600; }
  .lead-sub { font-size: 12px; color: var(--ink-3); margin-top: 1px; }
  .lead-actions-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-top: 4px; }
  .lead-action-lbl { display: block; font-size: 11px; color: var(--ink-3); letter-spacing: .14em; font-weight: 500; margin-bottom: 3px; }
  .lead-action-text { font-size: 12.5px; color: var(--ink-2); }
  .lead-value { font-size: 20px; font-weight: 700; color: var(--gold); font-family: 'JetBrains Mono', monospace; letter-spacing: -.01em; white-space: nowrap; }
  .lead-meta { display: flex; gap: 14px; font-size: 11px; color: var(--ink-3); }
  .lead-meta span { display: inline-flex; align-items: center; gap: 5px; }
  .lead-meta b { color: var(--ink-2); font-weight: 500; }

  /* Badges */
  .badge-hot {
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    font-size: 10px; letter-spacing: .15em; font-weight: 700;
    color: #ffd1d1; background: rgba(239,68,68,.14); border: 1px solid rgba(239,68,68,.30);
    padding: 4px 8px; border-radius: 999px;
  }
  .ember { width: 5px; height: 5px; background: #ff5b5b; border-radius: 50%; box-shadow: 0 0 8px #ff5b5b; }
  .badge-warm {
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    font-size: 10px; letter-spacing: .15em; font-weight: 700;
    color: #bfdbfe; background: rgba(96,165,250,.12); border: 1px solid rgba(96,165,250,.25);
    padding: 4px 8px; border-radius: 999px;
  }
  .badge-ok {
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    font-size: 10px; letter-spacing: .12em; font-weight: 700;
    color: #a7f3d0; background: rgba(52,211,153,.12); border: 1px solid rgba(52,211,153,.25);
    padding: 3px 8px; border-radius: 999px;
  }
  .badge-pending {
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    font-size: 10px; letter-spacing: .12em; font-weight: 700;
    color: #fde68a; background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.25);
    padding: 3px 8px; border-radius: 999px;
  }
  .badge-past {
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    font-size: 10px; letter-spacing: .12em; font-weight: 700;
    color: var(--ink-3); background: rgba(255,255,255,.05); border: 1px solid var(--line);
    padding: 3px 8px; border-radius: 999px;
  }

  /* -- Shoot cards (command center 3-col) -- */
  .shoots-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px; }
  .shoot-sm {
    background: linear-gradient(180deg, var(--card-2), var(--card));
    border: 1px solid var(--line); border-radius: 12px; padding: 16px;
    position: relative; overflow: hidden; cursor: pointer; transition: all .18s ease;
  }
  .shoot-sm:hover { transform: translateY(-1px); border-color: var(--line-2); }
  .shoot-cd { font-family: 'JetBrains Mono', monospace; font-size: 44px; font-weight: 700; line-height: 1; color: var(--gold); letter-spacing: -.04em; }
  .shoot-cd-lbl { font-size: 11px; color: var(--ink-3); letter-spacing: .22em; display: block; margin-top: 6px; font-weight: 500; }
  .shoot-title { font-size: 14px; font-weight: 600; margin-top: 14px; }
  .shoot-where { font-size: 12px; color: var(--ink-2); margin-top: 2px; }
  .shoot-foot { margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--line-2); display: flex; align-items: center; justify-content: space-between; font-size: 11.5px; color: var(--ink-3); }
  .shoot-net { color: var(--ink); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .shoot-ribbon { position: absolute; top: 14px; right: 14px; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); }

  /* -- Priorities -- */
  .priorities-list { padding: 8px; }
  .pri {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px; border-radius: 10px; transition: background .15s ease;
  }
  .pri:hover { background: rgba(255,255,255,.025); }
  .pri-num { width: 22px; height: 22px; border-radius: 6px; background: rgba(196,154,60,.12); color: var(--gold); font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; display: grid; place-items: center; flex-shrink: 0; margin-top: 1px; }
  .chk { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--ink-3); cursor: pointer; flex-shrink: 0; margin-top: 2px; display: grid; place-items: center; transition: all .15s ease; }
  .chk.on { background: var(--gold); border-color: var(--gold); color: #1a1305; }
  .chk.on svg { display: block; }
  .chk svg { display: none; }
  .pri-body { flex: 1; min-width: 0; }
  .pri-text { font-size: 13.5px; color: var(--ink); font-weight: 500; line-height: 1.35; }
  .pri.done .pri-text { color: var(--ink-3); text-decoration: line-through; }

  /* -- Revenue bar -- */
  .rev-wrap { padding: 16px 18px 18px; }
  .rev-top-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; }
  .rev-big { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
  .rev-of { color: var(--ink-3); font-size: 16px; font-weight: 500; }
  .rev-pct-badge { font-size: 12px; color: var(--gold); font-weight: 600; padding: 4px 8px; border-radius: 6px; background: var(--gold-soft); border: 1px solid rgba(196,154,60,.20); }
  .rev-bar { height: 10px; border-radius: 6px; overflow: hidden; background: rgba(255,255,255,.04); display: flex; box-shadow: inset 0 0 0 1px var(--line); }
  .seg-c { background: linear-gradient(90deg, #10b981, #34d399); }
  .seg-k { background: linear-gradient(90deg, #b8842f, #e3b85a); }
  .rev-legend { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .rev-leg { display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .leg-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .leg-label { color: var(--ink-2); flex: 1; }
  .leg-amt { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .leg-c .leg-swatch { background: var(--green); }
  .leg-k .leg-swatch { background: var(--gold); }
  .leg-r .leg-swatch { background: rgba(255,255,255,.10); border: 1px solid var(--line-2); }
  .leg-r .leg-amt { color: var(--ink-2); }

  /* -- Warm list -- */
  .warm-list { padding: 6px 6px 8px; }
  .warm-row { display: grid; grid-template-columns: 28px 1fr auto auto; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background .15s ease; }
  .warm-row:hover { background: rgba(255,255,255,.03); }
  .warm-init { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(160deg, var(--logo-a), var(--logo-b)); border: 1px solid var(--line-2); display: grid; place-items: center; font-size: 11px; font-weight: 700; color: var(--ink-2); font-family: 'JetBrains Mono', monospace; }
  .warm-name { font-size: 13px; color: var(--ink); font-weight: 500; line-height: 1.25; }
  .warm-name small { display: block; font-size: 11px; color: var(--ink-3); font-weight: 400; margin-top: 1px; }
  .warm-bar { width: 28px; height: 4px; border-radius: 2px; background: linear-gradient(90deg, rgba(96,165,250,.5), rgba(196,154,60,.5)); }

  /* -- Filters / pills -- */
  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
  .section-head h2 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: -.005em; }
  .filter-row { display: flex; gap: 6px; }
  .pill { font-size: 11px; padding: 5px 10px; border-radius: 999px; color: var(--ink-2); cursor: pointer; border: 1px solid var(--line); background: transparent; transition: all .15s; }
  .pill.on { background: var(--gold-soft); color: var(--gold); border-color: rgba(196,154,60,.30); }
  .pill:hover:not(.on) { color: var(--ink); border-color: var(--line-2); }

  /* -- Leads full table -- */
  .tbl-wrap { padding: 0 18px 18px; overflow-x: auto; }
  table.ltbl { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
  table.ltbl th { text-align: left; font-size: 11px; letter-spacing: .14em; color: var(--ink-3); font-weight: 500; padding: 10px 12px; border-bottom: 1px solid var(--line); }
  table.ltbl td { padding: 13px 12px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  table.ltbl tr:last-child td { border-bottom: none; }
  table.ltbl tr:hover td { background: rgba(255,255,255,.015); }
  table.ltbl tbody tr { cursor: pointer; }
  .tbl-name { font-weight: 600; }
  .tbl-org { font-size: 12px; color: var(--ink-3); margin-top: 2px; font-weight: 400; }
  .tbl-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--gold); }
  .tbl-days { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-3); }
  .tbl-action { color: var(--ink-2); max-width: 240px; white-space: normal; }

  /* -- Shoots page -- */
  .shoots-pg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .shoot-lg {
    background: linear-gradient(180deg, var(--card-2), var(--card));
    border: 1px solid var(--line); border-radius: 14px; padding: 22px;
    position: relative; overflow: hidden; cursor: pointer; transition: all .18s ease;
  }
  .shoot-lg:hover { transform: translateY(-2px); border-color: var(--line-2); }
  .shoot-lg .cd-num { font-family: 'JetBrains Mono', monospace; font-size: 56px; font-weight: 700; line-height: 1; color: var(--gold); letter-spacing: -.04em; }
  .shoot-lg .cd-lbl { font-size: 11px; color: var(--ink-3); letter-spacing: .22em; display: block; margin-top: 6px; font-weight: 500; }
  .shoot-lg .sc-title { font-size: 17px; font-weight: 700; margin-top: 18px; }
  .shoot-lg .sc-where { font-size: 13px; color: var(--ink-2); margin-top: 4px; }
  .shoot-lg .sc-foot { margin-top: 18px; padding-top: 14px; border-top: 1px dashed var(--line-2); display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--ink-3); }
  .shoot-lg .sc-val { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: var(--ink); }

  /* -- Revenue page -- */

  /* -- Skills page -- */
  .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .skill-card {
    background: linear-gradient(180deg, var(--card-2), var(--card));

    cursor: pointer; text-align: left; transition: all .18s ease;

  }
  .skill-card:hover { border-color: rgba(196,154,60,.35); transform: translateY(-2px); }
  .skill-card::after { content: ""; position: absolute; inset: 0; pointer-events: none; background: radial-gradient(300px 100px at 100% 0%, rgba(196,154,60,.05), transparent 60%); }
  .sk-icon { width: 40px; height: 40px; border-radius: 11px; background: rgba(196,154,60,.12); border: 1px solid rgba(196,154,60,.25); display: grid; place-items: center; color: var(--gold); margin-bottom: 14px; }

  /* -- Modal base -- */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.70); display: grid; place-items: center; z-index: 100; backdrop-filter: blur(4px); }
  .modal { background: var(--card-2); border: 1px solid var(--line-2); border-radius: 16px; width: 600px; max-width: 92vw; max-height: 82vh; display: flex; flex-direction: column; box-shadow: 0 40px 80px rgba(0,0,0,.6); }

  .modal-head h3 { margin: 0; font-size: 15px; font-weight: 600; }
  .modal-close { width: 30px; height: 30px; border-radius: 8px; background: rgba(255,255,255,.05); border: 1px solid var(--line); display: grid; place-items: center; cursor: pointer; color: var(--ink-2); }
  .modal-close:hover { color: var(--ink); background: rgba(255,255,255,.08); }
  .modal-body { padding: 18px 20px; overflow-y: auto; flex: 1; }
  .modal-prompt { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.7; color: var(--ink-2); white-space: pre-wrap; background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 16px; }
  .modal-foot { padding: 14px 20px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; }
  .copy-btn { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(180deg, var(--gold-2), var(--gold)); color: #1a1305; font-weight: 600; font-size: 13px; padding: 9px 16px; border-radius: 9px; border: 0; cursor: pointer; }
  .cancel-btn { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,.05); border: 1px solid var(--line); color: var(--ink-2); font-size: 13px; padding: 9px 16px; border-radius: 9px; cursor: pointer; }
  .claude-btn { display: inline-flex; align-items: center; gap: 8px; background: rgba(196,154,60,.12); border: 1px solid rgba(196,154,60,.30); color: var(--gold); font-weight: 600; font-size: 13px; padding: 9px 16px; border-radius: 9px; cursor: pointer; }

  /* -- Modal content components -- */
  .lm-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .lm-org { font-size: 13px; color: var(--ink-2); margin-bottom: 10px; }
  .lm-value-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .lm-value { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--gold); }
  .contact-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .contact-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-2); background: var(--card); border: 1px solid var(--line); padding: 6px 10px; border-radius: 8px; }
  .contact-item.na { color: var(--ink-3); font-style: italic; }
  .via-line { font-size: 12px; color: var(--ink-3); margin-bottom: 10px; }

  .m-divider { height: 1px; background: var(--line); margin: 14px 0; }
  .modal-section-label { font-size: 10px; letter-spacing: .18em; color: var(--ink-3); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
  .notes-text { font-size: 13px; color: var(--ink-2); line-height: 1.6; }
  .dm-box { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.7; color: var(--ink-2); white-space: pre-wrap; background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-bottom: 4px; }
  .dm-copy-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .checklist { display: flex; flex-direction: column; gap: 6px; }
  .cl-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border-radius: 8px; background: rgba(255,255,255,.02); cursor: pointer; transition: background .15s; }
  .cl-item:hover { background: rgba(255,255,255,.04); }
  .cl-item.done { opacity: .55; }
  .cl-chk { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--ink-3); display: grid; place-items: center; flex-shrink: 0; transition: all .15s; margin-top: 1px; }
  .cl-item.done .cl-chk { background: var(--gold); border-color: var(--gold); color: #1a1305; }
  .cl-text { font-size: 13px; color: var(--ink); line-height: 1.4; }
  .cl-item.done .cl-text { text-decoration: line-through; color: var(--ink-3); }

  /* -- Stat drill-down -- */
  .drill-rows { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }
  .drill-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .drill-row-label { font-size: 14px; font-weight: 600; color: var(--ink); }
  .drill-row-sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
  .drill-row-val { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: var(--gold); white-space: nowrap; flex-shrink: 0; }
  .drill-total { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--line); margin-bottom: 14px; }
  .drill-total-label { font-size: 13px; color: var(--ink-2); font-weight: 600; }
  .drill-total-val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--green); }

  /* -- Rev row popover -- */
  .rp-client { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .rp-amount { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; color: var(--gold); margin-bottom: 12px; }

  /* -- Utility -- */
  .err-banner { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25); border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #fca5a5; margin-bottom: 16px; }
  .load-note { color: var(--ink-3); font-size: 12px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* -- Nav count badge -- */
  .nav-count { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; color: var(--ink-3); background: rgba(255,255,255,.06); border: 1px solid var(--line); padding: 2px 6px; border-radius: 999px; }
  .nav-item.active .nav-count { color: var(--gold); background: rgba(196,154,60,.10); border-color: rgba(196,154,60,.20); }

  /* -- Welcome strip -- */
  .welcome-strip { border-left: 3px solid var(--gold); background: var(--card); border-radius: 10px; padding: 12px 16px; margin-bottom: 18px; }
  .welcome-serif { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 14px; color: var(--ink); }
  .welcome-meta { font-size: 12px; color: var(--ink-3); margin-top: 3px; }

  /* -- Daily Checklist panel -- */
  .dc-progress-wrap { padding: 12px 18px 0; }
  .dc-progress-label { font-size: 11px; color: var(--ink-3); letter-spacing: .12em; display: flex; justify-content: space-between; margin-bottom: 6px; }
  .dc-progress-bar { height: 4px; border-radius: 2px; background: rgba(255,255,255,.05); overflow: hidden; }
  .dc-progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-2), var(--gold)); border-radius: 2px; transition: width .35s ease; }
  .dc-list { padding: 8px 8px 10px; }
  .dc-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background .15s; }
  .dc-row:hover { background: rgba(255,255,255,.025); }
  .dc-chk { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--ink-3); display: grid; place-items: center; flex-shrink: 0; margin-top: 1px; transition: all .15s; }
  .dc-row.done .dc-chk { background: var(--gold); border-color: var(--gold); color: #1a1305; }
  .dc-body { flex: 1; min-width: 0; }
  .dc-text { font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1.3; }
  .dc-row.done .dc-text { text-decoration: line-through; color: var(--ink-3); }
  .dc-meta { font-size: 11px; color: var(--ink-3); margin-top: 3px; }
  .dc-row.done .dc-meta { opacity: .5; }
  .cat-badge { font-size: 9px; letter-spacing: .14em; font-weight: 700; padding: 3px 7px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .cat-urgent    { color: #ffd1d1; background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.25); }
  .cat-outreach  { color: #bfdbfe; background: rgba(96,165,250,.12); border: 1px solid rgba(96,165,250,.25); }
  .cat-follow-up { color: #fed7aa; background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.25); }
  .cat-content   { color: #a7f3d0; background: rgba(52,211,153,.12); border: 1px solid rgba(52,211,153,.25); }
  .cat-pipeline  { color: #fde68a; background: rgba(196,154,60,.12); border: 1px solid rgba(196,154,60,.25); }
  .reset-btn { font-size: 11px; color: var(--ink-3); background: transparent; border: 1px solid var(--line); padding: 4px 10px; border-radius: 6px; cursor: pointer; }
  .reset-btn:hover { color: var(--ink-2); border-color: var(--line-2); }
  .day-complete-txt { color: var(--gold); font-size: 11px; letter-spacing: .14em; font-weight: 600; }

  /* -- Checklist sections and tags -- */
  .cl-section-label { font-size: 10px; letter-spacing: 0.1em; color: var(--ink-2); font-family: 'Courier New', monospace; margin: 4px 12px 6px; padding-bottom: 4px; border-bottom: 1px solid #1a1a1a; }
  .cl-empty { padding: 12px 12px; font-size: 12px; color: var(--ink-3); }
  .cl-item.checked .cl-text { opacity: 0.4; text-decoration: line-through; }
  .cl-tag { font-size: 9px; letter-spacing: .14em; font-weight: 700; padding: 3px 7px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; margin-left: auto; }
  .cl-tag-invoice, .cl-tag-outreach { color: #bfdbfe; background: rgba(96,165,250,.12); border: 1px solid rgba(96,165,250,.25); }
  .cl-tag-shoot { color: #fed7aa; background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.25); }
  .cl-tag-hold { color: var(--ink-3); background: rgba(255,255,255,.05); border: 1px solid var(--line); }
  .cl-tag-priority { color: #ffd1d1; background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.25); }
  .cl-tag-strategy, .cl-tag-content { background: rgba(100,100,200,.15); color: #8888cc; border: 1px solid rgba(100,100,200,.25); }
  .cl-tag-revenue { background: rgba(196,154,60,.15); color: var(--gold); border: 1px solid rgba(196,154,60,.25); }
  .cl-tag-relationship { background: rgba(100,200,100,.12); color: #88bb88; border: 1px solid rgba(100,200,100,.25); }
  .cl-tag-risk { background: rgba(200,80,80,.15); color: #cc8888; border: 1px solid rgba(200,80,80,.25); }
  /* -- Shoot prep docs -- */
  .prep-btn { margin-top: 10px; background: none; border: 1px solid #333; color: var(--ink-2); font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: 'Courier New', monospace; letter-spacing: 0.05em; }
  .prep-btn:hover { border-color: var(--gold); color: var(--gold); }
  .prep-panel { margin-top: 12px; padding: 14px; background: #0d0d0d; border-radius: 6px; border: 1px solid #1a1a1a; }
  .prep-title { font-size: 12px; color: var(--gold); font-family: 'Courier New', monospace; margin-bottom: 10px; letter-spacing: 0.05em; }
  .prep-h1 { font-size: 14px; font-weight: bold; color: var(--ink); margin: 10px 0 4px; }
  .prep-h2 { font-size: 12px; font-weight: bold; color: var(--gold); margin: 10px 0 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .prep-quote { border-left: 2px solid var(--gold); padding-left: 10px; color: var(--ink); font-style: italic; margin: 6px 0; font-size: 12px; }
  .prep-bold { font-weight: bold; color: var(--ink); font-size: 12px; margin: 4px 0; }
  .prep-li { color: var(--ink-2); font-size: 12px; padding-left: 12px; margin: 2px 0; }
  .prep-li::before { content: '· '; color: var(--gold); }
  .prep-p { color: var(--ink-2); font-size: 12px; margin: 3px 0; line-height: 1.5; }
  .prep-spacer { height: 8px; }
  /* -- Agents page -- */
  .ag-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .ag-card {
    background: linear-gradient(180deg, var(--card-2), var(--card));
    border: 1px solid var(--line); border-radius: 12px; padding: 16px 14px;
    cursor: pointer; transition: all .18s ease; text-align: left; position: relative; overflow: hidden;
  }
  .ag-card:hover { border-color: var(--line-2); transform: translateY(-1px); }
  .ag-card.active { border-color: rgba(196,154,60,.40); background: linear-gradient(180deg, rgba(196,154,60,.08), var(--card)); }
  .ag-card::after { content: ""; position: absolute; inset: 0; pointer-events: none; background: radial-gradient(300px 100px at 100% 0%, rgba(196,154,60,.04), transparent 60%); }
  .ag-card-icon { width: 36px; height: 36px; border-radius: 9px; background: rgba(196,154,60,.12); border: 1px solid rgba(196,154,60,.22); display: grid; place-items: center; color: var(--gold); margin-bottom: 10px; }
  .ag-card.active .ag-card-icon { background: rgba(196,154,60,.20); }
  .ag-card-name { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
  .ag-card-tag  { font-size: 11px; color: var(--ink-3); line-height: 1.4; }

  .ag-panel { background: var(--card); border: 1px solid var(--line); border-radius: 14px; display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); }
  .ag-context-strip { display: flex; align-items: center; gap: 6px; padding: 10px 16px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .ag-context-label { font-size: 10px; letter-spacing: .14em; color: var(--ink-3); font-weight: 600; text-transform: uppercase; margin-right: 2px; }
  .ag-ctx-pill { font-size: 10px; color: var(--ink-3); background: rgba(255,255,255,.04); border: 1px solid var(--line); padding: 2px 8px; border-radius: 999px; }

  .ag-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; min-height: 340px; max-height: 460px; }
  .ag-bubble-wrap-ai   { display: flex; justify-content: flex-start; }
  .ag-bubble-wrap-user { display: flex; justify-content: flex-end; }
  .ag-bubble-ai {
    background: var(--card-2); border: 1px solid var(--line);
    border-radius: 12px 12px 12px 4px; padding: 11px 14px;
    max-width: 82%; font-size: 13px; color: var(--ink); line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
  }
  .ag-bubble-user {
    background: linear-gradient(180deg, rgba(196,154,60,.22), rgba(196,154,60,.14));
    border: 1px solid rgba(196,154,60,.30);
    border-radius: 12px 12px 4px 12px; padding: 11px 14px;
    max-width: 72%; font-size: 13px; color: var(--ink); line-height: 1.55;
    word-break: break-word;
  }
  .ag-typing { display: flex; gap: 5px; align-items: center; padding: 11px 14px; }
  .ag-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-3); animation: ag-bounce 1.2s infinite; }
  .ag-dot:nth-child(2) { animation-delay: .2s; }
  .ag-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes ag-bounce { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-5px);opacity:1} }

  .ag-input-row { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--line); }
  .ag-input {
    flex: 1; background: var(--bg-2); border: 1px solid var(--line); border-radius: 10px;
    color: var(--ink); font-family: 'Inter', sans-serif; font-size: 13px;
    padding: 10px 14px; outline: none; resize: none; line-height: 1.4;
    min-height: 42px; max-height: 120px;
  }
  .ag-input:focus { border-color: rgba(196,154,60,.40); }
  .ag-send {
    background: linear-gradient(180deg, var(--gold-2), var(--gold));
    color: #1a1305; border: none; border-radius: 10px;
    width: 42px; height: 42px; display: grid; place-items: center;
    cursor: pointer; flex-shrink: 0; font-weight: 700;

  }

  .ag-no-key { background: rgba(239,68,68,.07); border: 1px solid rgba(239,68,68,.22); border-radius: 10px; padding: 14px 18px; font-size: 13px; color: #fca5a5; margin-bottom: 16px; line-height: 1.55; }
  .ag-empty { color: var(--ink-3); font-size: 13px; padding: 32px 0; text-align: center; }

  @media (max-width: 768px) {
    .ag-selector { grid-template-columns: repeat(2, 1fr); }
    .ag-messages { min-height: 260px; max-height: 340px; }
  }

  /* -- Playbook page -- */
  .pb-intro { background: var(--card); border: 1px solid rgba(196,154,60,.20); border-radius: 12px; padding: 16px 20px; margin-bottom: 22px; font-size: 13px; color: var(--ink-2); line-height: 1.6; }
  .pb-intro strong { color: var(--ink); }
  .pb-accordion { display: flex; flex-direction: column; gap: 10px; }

  .pb-section-head {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 14px 18px; cursor: pointer; user-select: none;
    transition: background .15s;
  }
  .pb-section-head:hover { background: rgba(255,255,255,.025); }
  .pb-section-head h3 { margin: 0; font-size: 13.5px; font-weight: 600; color: var(--ink); }
  .pb-section-chev { color: var(--ink-3); transition: transform .2s; flex-shrink: 0; }
  .pb-section-chev.open { transform: rotate(90deg); }
  .pb-section-body { padding: 0 18px 16px; border-top: 1px solid var(--line); }
  .pb-h2 { font-size: 11px; letter-spacing: .16em; font-weight: 700; color: var(--gold); text-transform: uppercase; margin: 16px 0 6px; }
  .pb-h3 { font-size: 12px; font-weight: 700; color: var(--ink); margin: 12px 0 4px; }
  .pb-p { font-size: 13px; color: var(--ink-2); line-height: 1.6; margin: 4px 0; }
  .pb-li { font-size: 13px; color: var(--ink-2); line-height: 1.55; padding-left: 14px; margin: 3px 0; position: relative; }
  .pb-li::before { content: '·'; position: absolute; left: 0; color: var(--gold); font-weight: 700; }
  .pb-script {
    background: rgba(96,165,250,.07); border-left: 3px solid var(--blue);
    border-radius: 0 8px 8px 0; padding: 10px 14px; margin: 8px 0;
    font-size: 12.5px; color: var(--ink); line-height: 1.6; font-style: italic;
  }
  .pb-bold { font-size: 13px; font-weight: 600; color: var(--ink); margin: 6px 0; }
  .pb-rule { border: none; border-top: 1px solid var(--line); margin: 14px 0; }
  .pb-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 10px 0; }
  .pb-table th { text-align: left; font-size: 10px; letter-spacing: .14em; color: var(--ink-3); font-weight: 600; padding: 6px 10px; border-bottom: 1px solid var(--line); }
  .pb-table td { padding: 8px 10px; border-bottom: 1px solid var(--line); color: var(--ink-2); vertical-align: top; }

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* ═══ Briefing parser ═══ */
function parseBriefing(md) {
  if (!md || !md.trim()) return null;
  const text = md.trim();
  const lines = text.split('\n');

  const extract = (label) => {
    const re = new RegExp(`^${label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}`, 'im');
    const idx = lines.findIndex(l => re.test(l.trim()));
    if (idx === -1) return '';
    const SECTION_HEADS = /^(PUNCHLIST|EXECUTIVE ACTIONS|TOMORROW'S HIGHEST|UPCOMING|REVENUE|COUNCIL NOTE|WHERE THE COUNCIL|Good )/i;
    const body = [];
    for (let i = idx + 1; i < lines.length; i++) {
      if (SECTION_HEADS.test(lines[i].trim()) && lines[i].trim().length > 0) break;
      body.push(lines[i]);
    }
    return body.join('\n').trim();
  };

  const greeting = lines[0] || '';
  const intro = (() => {
    const body = [];
    let i = 1;
    const SECTION_HEADS = /^(PUNCHLIST|EXECUTIVE ACTIONS|TOMORROW'S HIGHEST|UPCOMING|REVENUE|COUNCIL NOTE)/i;
    while (i < lines.length) {
      if (SECTION_HEADS.test(lines[i].trim()) && lines[i].trim().length > 0) break;
      if (lines[i].trim()) body.push(lines[i]);
      i++;
    }
    return body.join('\n').trim();
  })();

  return {
    greeting,
    intro,
    punchlist: extract('PUNCHLIST'),
    executive: extract('EXECUTIVE ACTIONS'),
    tomorrow:  extract("TOMORROW'S HIGHEST LEVERAGE MOVE"),
    upcoming:  extract('UPCOMING'),
    revenue:   extract('REVENUE'),
    council:   extract('COUNCIL NOTE'),
    raw: text,
  };
}

/* ═══ Vault API ═══ */
function useVaultFile(path) {
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);
  const [tick, setTick]       = useState(0);

  useEffect(() => {
    let live = true;
    setLoading(true); setError(null);
    fetch('/api/vault?file=' + encodeURIComponent(path))
      .then(r => { if (!r.ok) throw new Error(`${r.status} ${r.statusText}`); return r.text(); })
      .then(t => { if (live) { setData(t); setLoading(false); } })
      .catch(e => { if (live) { setError(e.message); setLoading(false); } });
    return () => { live = false; };
  }, [path, tick]);

  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 300000);
    return () => clearInterval(id);
  }, [path]);

  return { data, loading, error, retry: () => setTick(t => t + 1) };
}

/* ═══ hot.md parser ═══ */
function parseHot(md) {
  if (!md) return null;
  const lines = md.split('\n');

  const top3 = [];
  let inTop = false;
  for (const l of lines) {
    if (/^##\s+Top 3/i.test(l))    { inTop = true; continue; }
    if (inTop && /^##\s/.test(l))  { inTop = false; }
    if (inTop) { const m = l.match(/^\d+\.\s+(.+)/); if (m) top3.push(m[1].trim()); }
  }

  function table(re) {
    const rows = []; let inSec = false, pastDiv = false;
    for (const l of lines) {
      if (re.test(l))               { inSec = true; pastDiv = false; continue; }
      if (inSec && /^##\s/.test(l)) { inSec = false; continue; }
      if (!inSec) continue;
      if (/^\|[-:\s|]+\|/.test(l)) { pastDiv = true; continue; }
      if (pastDiv && l.trim().startsWith('|')) {
        const cells = l.split('|').map(c => c.trim()).filter((_, i, a) => i > 0 && i < a.length - 1);
        if (cells.length >= 2) rows.push(cells);
      }
    }
    return rows;
  }

  const pipeline = table(/^##\s+HOT Pipeline/i).map(([name, action, value]) => ({
    name: name || '', action: action || '', value: value || '',
    numValue: parseFloat((value || '').replace(/[$,]/g, '')) || 0,
  }));

  const shoots = table(/^##\s+Upcoming Shoots/i).map(([date, job, value]) => ({
    date: date || '', job: job || '', value: value || '',
    numValue: parseFloat((value || '').replace(/[$,]/g, '')) || 0,
  }));

  const revSec = md.match(/##\s+Revenue[^\n]*([\s\S]*?)(?:\n##|$)/i)?.[1] || '';
  const n = s => parseFloat((s || '').replace(/[$,\s]/g, '')) || 0;
  const collected  = n(revSec.match(/Collected[^:]*:\s*(\$?[\d,]+)/i)?.[1]);
  const contracted = n(revSec.match(/Contracted[^:]*:\s*(\$?[\d,]+)/i)?.[1]);
  const goal       = n(revSec.match(/goal[^:]*:\s*(\$?[\d,]+)/i)?.[1]) || 10000;

  return { top3, pipeline, shoots, revenue: { collected, contracted, goal } };
}

function generatedGreeting() {
  const h = new Date().getHours();
  const time = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const d = new Date();
  return `Good ${time}, Bentley. Today is ${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}.`;
}

function currentMonthLabel() {

function parseChecklistFromHot(hotText) {
  const section = hotText.match(/## Top 3 Right Now\n([\s\S]*?)(?=\n##|$)/);
  if (!section) return null;
  const items = section[1]
    .split('\n')
    .filter(l => /^\d+\./.test(l.trim()))
    .map((line, i) => {
      const text = line.replace(/^\d+\.\s*/, '').trim();
      let category = 'PRIORITY';
      if (/URGENT|before May|before Jun|days away/i.test(text)) category = 'URGENT';
      else if (/DM|outreach|send|day 1/i.test(text))           category = 'OUTREACH';
      else if (/call|walk in|follow|text/i.test(text))          category = 'FOLLOW-UP';
      else if (/content|post|reel|story/i.test(text))           category = 'CONTENT';
      else if (/airtable|scout|pipeline|check/i.test(text))     category = 'PIPELINE';
      return { id: `hot-${i}`, category, text, meta: '' };
    });
  return items.length > 0 ? items : null;
}

function parseWarmFromHot(hotText) {
  if (!hotText) return null;
  const lines = hotText.split('\n');
  const rows = []; let inSec = false, pastDiv = false;
  for (const l of lines) {
    if (/^##\s+WARM\s+(Pipeline|Leads?)/i.test(l)) { inSec = true; pastDiv = false; continue; }
    if (inSec && /^##\s/.test(l)) { inSec = false; continue; }
    if (!inSec) continue;
    if (/^\|[-:\s|]+\|/.test(l)) { pastDiv = true; continue; }
    if (pastDiv && l.trim().startsWith('|')) {
      const cells = l.split('|').map(c => c.trim()).filter((_, i, a) => i > 0 && i < a.length - 1);
      if (cells.length >= 1 && cells[0]) rows.push(cells);
    }
  }
  if (!rows.length) return null;
  return rows.map(([name, sub]) => ({
    name: name || '',
    sub:  sub  || '',
    init: (name || '').split(/\s+/).map(w => w[0] || '').slice(0, 2).join('').toUpperCase(),
    heat: 0.5,
  }));
}

/* ═══ Helpers ═══ */
function daysUntil(dateStr) {
  const clean = dateStr.replace(/\s*[--].*/, '').trim();
  const year  = new Date().getFullYear();
  const d = new Date(`${clean} ${year}`);
  if (isNaN(d)) return null;
  const today = new Date(); today.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

/* ═══ Clock ═══ */
function useClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const id = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(id); }, []);
  return now;
}
function Clock() {
  const now  = useClock();
  const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  const date = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  return (
    <div className="clock-widget">
      <span style={{ color: 'var(--ink-3)' }}>{I.clock()}</span>
      <div style={{ display: 'flex', flexDirection: 'column', lineHeight: 1.1 }}>
        <span className="clock-t">{time}</span>
        <span className="clock-d">{date} · CST</span>
      </div>
    </div>
  );
}

/* ═══ Sparkline ═══ */
function Spark({ pts, color }) {
  const w = 140, h = 38;
  const min = Math.min(...pts), max = Math.max(...pts), rng = (max - min) || 1;
  const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${i / (pts.length - 1) * w} ${h - (p - min) / rng * h * 0.8 - 4}`).join(' ');
  const area = d + ` L ${w} ${h} L 0 ${h} Z`;
  const id = 'sg' + color.replace('#','');
  return (
    <svg className="spark-wrap" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity=".35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${id})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

    const total = pipeline.reduce((s, h) => s + h.numValue, 0);
    return (
      <BaseModal onClose={onClose} title="HOT Pipeline Breakdown" foot={<button className="cancel-btn" onClick={onClose}>Close</button>}>
        <div className="modal-section-label">{pipeline.length} Active HOT Lead{pipeline.length !== 1 ? 's' : ''}</div>
        <div className="drill-rows">
          {pipeline.map((h, i) => (
            <div key={i} className="drill-row">
              <div>
                <div className="drill-row-label">{h.name}</div>
                <div className="drill-row-sub">{h.action}</div>
              </div>
              <div className="drill-row-val">{h.value}</div>
            </div>
          ))}
        </div>
        <div className="drill-total">
          <span className="drill-total-label">Total Pipeline</span>
          <span className="drill-total-val">{fmtMoney(total)}</span>
        </div>
      </BaseModal>
    );
  }

  if (statKey === 'goal') {
    const collected   = rev.collected || 0;
    const contracted  = rev.contracted || 0;
    const goal        = rev.goal || 10000;
    const committed   = collected + contracted;
    const gap         = Math.max(goal - committed, 0);
    const hotPipeline = liveData?.pipeline ?? HOT_LEADS;
    return (
      <BaseModal onClose={onClose} title={`Monthly Goal · ${monthLabel}`} foot={<button className="cancel-btn" onClick={onClose}>Close</button>}>
        <div className="modal-section-label">Committed Revenue</div>
        <div className="drill-rows">
          <div className="drill-row">
            <div className="drill-row-label">Collected · {monthLabel.split(' ')[0]}</div>
            <div className="drill-row-val">{fmtMoney(collected)}</div>
          </div>
          <div className="drill-row">
            <div><div className="drill-row-label">Contracted · Straight Up Gravel</div></div>
            <div className="drill-row-val">{fmtMoney(contracted)}</div>
          </div>
        </div>
        <div className="drill-total" style={{ marginBottom: 16 }}>
          <span className="drill-total-label">Total Committed</span>
          <span className="drill-total-val">{fmtMoney(committed)}</span>
        </div>

        <div className="m-divider"></div>

        <div className="modal-section-label">Gap to {fmtMoney(goal)} Goal</div>
        <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 24, fontWeight: 700, color: 'var(--orange)', marginBottom: 16 }}>{fmtMoney(gap)}</div>

        {hotPipeline.length > 0 && (
          <>
            <div className="modal-section-label">HOT Leads to Close</div>
            <div className="drill-rows">
              {hotPipeline.map((h, i) => (
                <div key={i} className="drill-row">
                  <div className="drill-row-label">{h.name}</div>
                  <div className="drill-row-val">{h.value}</div>
                </div>
              ))}
            </div>
          </>
        )}
      </BaseModal>
    );
  }

  return null;
}

function RevRowModal({ row, onClose }) {

  return (
    <BaseModal
      onClose={onClose}
      title="Revenue Detail"
      foot={
        <>
          <button className="cancel-btn" onClick={onClose}>Close</button>

      <div className="rp-client">{row.client}</div>
      <div className="rp-amount">{fmtMoney(row.amount)}</div>

function ModalManager({ modal, onClose }) {
  if (!modal) return null;
  const { type, data } = modal;
  if (type === 'lead')    return <LeadModal lead={data} onClose={onClose}/>;
  if (type === 'warm')    return <WarmModal lead={data} onClose={onClose}/>;
  if (type === 'shoot')   return <ShootModal shoot={data} onClose={onClose}/>;
  if (type === 'stat')    return <StatModal statKey={data} liveData={modal.liveData} onClose={onClose}/>;
  if (type === 'revrow')  return <RevRowModal row={data} onClose={onClose}/>;
  return null;
}

const DAILY_CHECKLIST = [];

function WelcomeStrip({ done, remaining }) {
  const hr   = new Date().getHours();
  const greet = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
  const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  const msg   = hr < 12
    ? (remaining > 0 ? `You have ${remaining} unchecked item${remaining !== 1 ? 's' : ''}. Start with the first one.` : 'All items checked. Day complete.')
    : (done > 0 ? `${done} item${done !== 1 ? 's' : ''} done today. ${remaining} remaining.` : `${remaining} items waiting. Pick one and go.`);
  return (
    <div className="welcome-strip">
      <span className="welcome-serif">{greet}, Bentley. Today is {today}.</span>
      <div className="welcome-meta">{msg}</div>
    </div>
  );
}

function DailyChecklist() {
  const [checklist, setChecklist] = useState({ punchlist: [], executive: [], date: null });
  const [clLoading, setClLoading] = useState(true);

  useEffect(() => {
    fetch('/api/checklist')
      .then(r => r.ok ? r.json() : { punchlist: [], executive: [] })
      .then(data => { setChecklist(data); setClLoading(false); })
      .catch(() => setClLoading(false));
  }, []);

  function toggleItem(id) {
    const today = new Date().toISOString().slice(0, 10);
    const allItems = [...checklist.punchlist, ...checklist.executive];
    const currentChecked = allItems.filter(i => i.checked).map(i => i.id);
    const newChecked = currentChecked.includes(id)
      ? currentChecked.filter(x => x !== id)
      : [...currentChecked, id];
    setChecklist(prev => ({
      ...prev,
      punchlist: prev.punchlist.map(i => i.id === id ? { ...i, checked: !i.checked } : i),
      executive: prev.executive.map(i => i.id === id ? { ...i, checked: !i.checked } : i),
    }));
    fetch('/api/vault-write', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file: 'daily/checklist-state.json', content: JSON.stringify({ date: today, checked: newChecked }) }),
    });
  }

  function resetChecklist() {
    const today = new Date().toISOString().slice(0, 10);
    setChecklist(prev => ({
      ...prev,
      punchlist: prev.punchlist.map(i => ({ ...i, checked: false })),
      executive: prev.executive.map(i => ({ ...i, checked: false })),
    }));
    fetch('/api/vault-write', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file: 'daily/checklist-state.json', content: JSON.stringify({ date: today, checked: [] }) }),
    });
  }

  const totalItems = checklist.punchlist.length + checklist.executive.length;
  const doneItems  = [...checklist.punchlist, ...checklist.executive].filter(i => i.checked).length;
  const allDone    = doneItems === totalItems && totalItems > 0;

  return (
    <div className="panel" style={allDone ? { boxShadow: '0 0 0 1px rgba(196,154,60,.45), 0 12px 30px rgba(196,154,60,.08), 0 2px 8px rgba(0,0,0,.25)' } : {}}>
      <div className="panel-head">
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <h3>Daily Checklist</h3>
          {allDone && <span className="day-complete-txt">Day complete</span>}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span className="ph-meta">{new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</span>
          <button className="reset-btn" onClick={e => { e.stopPropagation(); resetChecklist(); }}>Reset</button>
        </div>
      </div>
      <div className="dc-progress-wrap">
        <div className="dc-progress-label"><span>Progress</span><span>{doneItems} / {totalItems} complete</span></div>
        <div className="dc-progress-bar"><div className="dc-progress-fill" style={{ width: totalItems > 0 ? `${doneItems / totalItems * 100}%` : '0%' }}></div></div>
      </div>
      <div className="dc-list">
        {clLoading && <div className="cl-empty">Loading checklist...</div>}

        {!clLoading && checklist.punchlist.length === 0 && (
          <div className="cl-empty">No briefing yet — check back after 9am.</div>
        )}

        {checklist.punchlist.length > 0 && (
          <>
            <div className="cl-section-label">PUNCHLIST</div>
            {checklist.punchlist.map(item => (
              <div key={item.id} className={'dc-row ' + (item.checked ? 'done' : '')} onClick={() => toggleItem(item.id)}>
                <div className="dc-chk">{item.checked && I.check()}</div>
                <div className="dc-body"><div className="dc-text">{item.text}</div></div>
                <span className={'cat-badge cl-tag cl-tag-' + item.tag.toLowerCase()}>{item.tag}</span>
              </div>
            ))}
            <div className="cl-section-label" style={{ marginTop: 12 }}>EXECUTIVE</div>
            {checklist.executive.map(item => (
              <div key={item.id} className={'dc-row ' + (item.checked ? 'done' : '')} onClick={() => toggleItem(item.id)}>
                <div className="dc-chk">{item.checked && I.check()}</div>
                <div className="dc-body"><div className="dc-text">{item.text}</div></div>
                <span className={'cat-badge cl-tag cl-tag-' + item.tag.toLowerCase()}>{item.tag}</span>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

const WARM_PIPELINE = [];

function DashPage({ openModal }) {
  const { data: raw, loading, error, retry } = useVaultFile('hot.md');
  const parsed = raw ? parseHot(raw) : null;
  const d      = parsed || FB;

  // Filter: HOT pipeline only (exclude DEAD entries with $0 value or "DEAD" in action)
  const hotPipeline = d.pipeline.filter(l =>
    l.numValue > 0 && !l.action.toLowerCase().startsWith('dead')
  );

  // Filter: only future confirmed shoots (no OPEN/fell-through/renewal, no past dates)
  const confirmedShoots = d.shoots.filter(s => {
    if (/open|fell.through|renewal/i.test(s.job)) return false;
    const days = daysUntil(s.date);
    return days !== null && days >= 0;
  });

  const pipeVal = hotPipeline.reduce((s, l) => s + l.numValue, 0);
  const next    = confirmedShoots[0];
  const nextD   = next ? daysUntil(next.date) : null;
  const goalPct = Math.round((d.revenue.collected + d.revenue.contracted) / d.revenue.goal * 100);
  const liveData = { pipeline: hotPipeline, revenue: d.revenue };

  const [done, setDone] = useState({});
  const toggle = i => setDone(s => ({ ...s, [i]: !s[i] }));


  // Warm Pipeline: live from hot.md WARM section, fallback to constant
  const warmPipeline = raw ? (parseWarmFromHot(raw) || WARM_PIPELINE) : WARM_PIPELINE;

  // Briefing: live from daily/briefing.md via vault hook (auto-refreshes with hot.md)
  const { data: briefingRaw } = useVaultFile('daily/briefing.md');
  const briefingData = briefingRaw ? parseBriefing(briefingRaw) : null;
  const [briefingOpen, setBriefingOpen] = useState(false);

  return (
    <>
      <div className="topbar">
        <div>
          <div className="crumb">
            <span>Workspace · Command Center</span>
            <span className="live-badge"><span className="pulse"></span>LIVE</span>
          </div>
          <h1 className="page-title">Command Center</h1>
        </div>
        <div className="top-right">
          <Clock/>
          <button className="icon-btn">{I.search()}</button>
          <button className="icon-btn">{I.bell()}<span className="notif-dot"></span></button>
          <button className="new-btn">{I.plus()} New Lead</button>
        </div>
      </div>

      {error   && <div className="err-banner">Vault fetch failed -- <button onClick={retry} style={{ background:'none', border:'1px solid rgba(239,68,68,.4)', color:'#fca5a5', borderRadius:5, padding:'2px 8px', cursor:'pointer', fontSize:12 }}>Retry</button></div>}
      {loading && <div className="load-note"><span className="pulse"></span>Fetching live vault data...</div>}

      {/* Stats */}
      <div className="stat-grid">
        <div className="stat s-green" onClick={() => openModal({ type: 'stat', data: 'collected', liveData })}>
          <div className="stat-row1">
            <div><div className="stat-label">Revenue Collected · {new Date().toLocaleDateString('en-US',{month:'short'})}</div><div className="stat-value">{fmtMoney(d.revenue.collected)}</div></div>
            <div className="stat-badge">{I.dollar()}</div>
          </div>
          <div className="stat-delta d-green">{I.trendUp({ style: { color: 'var(--green)' } })} <b>{fmtMoney(d.revenue.collected)}</b> collected this month</div>
          <Spark pts={[10,12,9,14,18,16,22,28,34]} color="#34d399"/>
        </div>

        <div className="stat s-blue" onClick={() => openModal({ type: 'stat', data: 'pipeline', liveData })}>
          <div className="stat-row1">
            <div><div className="stat-label">Pipeline Value</div><div className="stat-value">{fmtMoney(pipeVal)}</div></div>
            <div className="stat-badge">{I.flame()}</div>
          </div>
          <div className="stat-delta d-blue"><b>{hotPipeline.length} active HOT lead{hotPipeline.length !== 1 ? 's' : ''}</b></div>
          <Spark pts={[18,22,20,28,26,30,34,32,38]} color="#60a5fa"/>
        </div>

        <div className="stat s-gold" onClick={() => { const sd = lookupShootDetail(next ? next.job : ''); if (sd) openModal({ type: 'shoot', data: sd }); }}>
          <div className="stat-row1">
            <div>
              <div className="stat-label">Next Shoot</div>
              <div className="stat-value">{nextD !== null ? nextD : '--'}<span className="stat-unit">days</span></div>
            </div>
            <div className="stat-badge">{I.cam()}</div>
          </div>
          <div className="stat-delta d-gold"><b>{next ? next.job : '--'}</b> · {next ? next.date : '--'}</div>
          <Spark pts={[40,32,28,24,20,18,14,10,8]} color="#c49a3c"/>
        </div>

        <div className="stat s-orange" onClick={() => openModal({ type: 'stat', data: 'goal', liveData })}>
          <div className="stat-row1">
            <div><div className="stat-label">Monthly Goal</div><div className="stat-value">{goalPct}<span className="stat-unit">%</span></div></div>
            <div className="stat-badge">{I.target()}</div>
          </div>

        </div>
      </div>

      {/* Expandable briefing strip */}
      <div
        onClick={() => setBriefingOpen(o => !o)}

          background: 'var(--card)', borderLeft: '3px solid var(--gold)', borderRadius: '8px',

          justifyContent: 'space-between', alignItems: 'center', marginBottom: briefingOpen ? '0' : '16px',

        <div style={{
          background: 'var(--card)', borderRadius: '0 0 8px 8px', padding: '16px 20px', marginBottom: '16px',
          borderLeft: '3px solid var(--gold)', borderTop: '1px solid var(--line)',

          {!briefingData ? (
            <div style={{ color: 'var(--ink-3)', fontSize: 13, fontStyle: 'italic', padding: '4px 0' }}>
              Briefing not yet generated today. Check back after 9am.

          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {briefingData.intro && (
                <div style={{ fontSize: 13, color: 'var(--ink-2)', lineHeight: 1.65 }}>{briefingData.intro}</div>

              {briefingData.punchlist && (
                <div>
                  <div style={{ fontSize: 10, letterSpacing: '.18em', color: 'var(--gold)', fontWeight: 700, marginBottom: 6, textTransform: 'uppercase' }}>Punchlist</div>

                </div>
              )}
              {briefingData.executive && (
                <div>
                  <div style={{ fontSize: 10, letterSpacing: '.18em', color: 'var(--blue)', fontWeight: 700, marginBottom: 6, textTransform: 'uppercase' }}>Executive Actions</div>
                  <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, lineHeight: 1.7, color: 'var(--ink-2)', whiteSpace: 'pre-wrap' }}>{briefingData.executive}</div>
                </div>
              )}

                <div style={{ background: 'rgba(196,154,60,.08)', border: '1px solid rgba(196,154,60,.20)', borderRadius: 8, padding: '10px 14px' }}>

                  <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, lineHeight: 1.7, color: 'var(--ink-2)', whiteSpace: 'pre-wrap' }}>{briefingData.upcoming}</div>
                </div>

              {briefingData.revenue && (
                <div>
                  <div style={{ fontSize: 10, letterSpacing: '.18em', color: 'var(--green)', fontWeight: 700, marginBottom: 6, textTransform: 'uppercase' }}>Revenue</div>
                  <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, lineHeight: 1.7, color: 'var(--ink-2)', whiteSpace: 'pre-wrap' }}>{briefingData.revenue}</div>
                </div>
              )}
              {briefingData.council && (
                <div style={{ borderTop: '1px solid var(--line)', paddingTop: 12 }}>
                  <div style={{ fontSize: 10, letterSpacing: '.18em', color: 'var(--ink-3)', fontWeight: 700, marginBottom: 6, textTransform: 'uppercase' }}>Council Note</div>
                  <div style={{ fontSize: 13, color: 'var(--ink-2)', fontStyle: 'italic', lineHeight: 1.6 }}>{briefingData.council}</div>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* Body */}
      <div className="body-grid">
        <div className="stack">
          {/* Pipeline */}
          <div className="panel">
            <div className="panel-head">
              <h3>Pipeline Snapshot</h3>
              <span className="ph-link">View all {I.arrow({ width: 11, height: 11 })}</span>
            </div>
            {hotPipeline.length === 0
              ? <div style={{ padding: '20px 16px', color: 'var(--ink-3)', fontSize: 13 }}>No active HOT leads right now. Check WARM pipeline.</div>
              : <div className="lead-grid">
                  {hotPipeline.map((l, i) => {
                    const hl = matchHotLead(l.name);
                    return (
                      <div key={i} className="lead-card" onClick={() => { if (hl) openModal({ type: 'lead', data: hl }); }}>
                        <div className="lead-top">
                          <div><div className="lead-name">{l.name}</div><div className="lead-sub">HOT lead</div></div>

const SHOOTS_STATIC = [];

function renderPrep(text) {
  if (!text) return null;
  return text.split('\n').map((line, i) => {
    if (/^## /.test(line))           return <div key={i} className="prep-h2">{line.replace(/^## /, '')}</div>;
    if (/^# /.test(line))            return <div key={i} className="prep-h1">{line.replace(/^# /, '')}</div>;
    if (/^> /.test(line))            return <div key={i} className="prep-quote">{line.replace(/^> /, '')}</div>;
    if (/^\*\*(.+)\*\*/.test(line))  return <div key={i} className="prep-bold">{line.replace(/\*\*/g, '')}</div>;
    if (/^- /.test(line))            return <div key={i} className="prep-li">{line.replace(/^- /, '')}</div>;
    if (line.trim() === '')          return <div key={i} className="prep-spacer" />;
    return <div key={i} className="prep-p">{line}</div>;
  });
}

function ShootsPage({ openModal }) {
  const { data: raw, loading, error, retry } = useVaultFile('hot.md');
  const parsed = raw ? parseHot(raw) : null;
  const shoots = parsed && parsed.shoots.length > 0
    ? parsed.shoots
        .filter(s => !/open|fell.through|renewal/i.test(s.job))
        .map(s => ({ title: s.job, where: '', date: s.date, value: s.value, status: 'confirmed', tag: 'Shoot' }))
    : SHOOTS_STATIC;

  const upcoming = shoots.filter(s => { const d = daysUntil(s.date); return d !== null && d >= 0; });
  const past     = shoots.filter(s => { const d = daysUntil(s.date); return d !== null && d < 0; });

  const [shootPreps, setShootPreps] = useState([]);
  const [openPrep,   setOpenPrep]   = useState(null);

  useEffect(() => {
    fetch('/api/shoot-preps')
      .then(r => r.ok ? r.json() : [])
      .then(setShootPreps)
      .catch(() => {});
  }, []);

  const prepForShoot = (shoot) => shootPreps.find(p =>
    shoot.title.toLowerCase().includes(p.shootTitle.toLowerCase()) ||
    p.shootTitle.toLowerCase().includes(shoot.title.toLowerCase())
  );

  return (
    <>
      <div className="topbar">
        <div>
          <div className="crumb"><span>Workspace · Shoots</span></div>
          <h1 className="page-title">Shoots</h1>
          <div className="subtitle">
            {loading ? 'Loading...' : <><em>{upcoming.length} upcoming</em>{upcoming[0] ? ` · next: ${upcoming[0].title}` : ''}.</>}
          </div>
        </div>
        <div className="top-right"><Clock/></div>
      </div>

      {error && <div className="err-banner">Vault fetch failed -- <button onClick={retry} style={{ background:'none', border:'1px solid rgba(239,68,68,.4)', color:'#fca5a5', borderRadius:5, padding:'2px 8px', cursor:'pointer', fontSize:12 }}>Retry</button></div>}
      {!loading && !error && shoots.length === 0 && <div style={{ padding: '40px 0', textAlign: 'center', color: 'var(--ink-3)', fontSize: 13 }}>No shoots in vault. Update hot.md Upcoming Shoots section.</div>}

      {upcoming.length > 0 && (
        <>
          <div className="sect-div">Upcoming</div>
          <div className="shoots-pg-grid">
            {upcoming.map((s, i) => {
              const days = daysUntil(s.date);
              const sd   = SHOOT_DETAIL[s.title];
              return (
                <div key={i} className="shoot-lg" onClick={() => { if (sd) openModal({ type: 'shoot', data: sd }); }}>
                  <div className="sc-badge-pos">
                    {s.status === 'confirmed' ? <span className="badge-ok">Confirmed</span> : <span className="badge-pending">Pending</span>}
                  </div>
                  <div className="cd-num">{days !== null ? String(days).padStart(2,'0') : '--'}</div>
                  <div className="cd-lbl">DAYS OUT</div>
                  <div className="sc-title">{s.title}</div>
                  <div className="sc-where">{[s.where, s.date].filter(Boolean).join(' · ')}</div>
                  <div className="sc-foot">
                    <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 11, letterSpacing: '.14em', textTransform: 'uppercase' }}>{s.tag}</span>
                    <span className="sc-val">{s.value || '--'}</span>
                  </div>
                  {prepForShoot(s) && (
                    <div>
                      <button
                        className="prep-btn"
                        onClick={(e) => { e.stopPropagation(); setOpenPrep(openPrep === s.date ? null : s.date); }}
                      >
                        {openPrep === s.date ? '▲ Hide Prep' : '▼ View Prep'}
                      </button>
                      {openPrep === s.date && (
                        <div className="prep-panel">
                          <div className="prep-title">{prepForShoot(s).prepTitle}</div>
                          <div className="prep-body">{renderPrep(prepForShoot(s).content)}</div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}

      {past.length > 0 && (
        <>
          <div className="sect-div">Past</div>
          <div className="shoots-pg-grid">
            {past.map((s, i) => (
              <div key={i} className="shoot-lg" style={{ opacity: .5 }}>
                <div className="sc-badge-pos"><span className="badge-past">Completed</span></div>
                <div className="cd-num" style={{ color: 'var(--ink-3)', fontSize: 32 }}>{I.cam()}</div>
                <div className="sc-title">{s.title}</div>
                <div className="sc-where">{[s.where, s.date].filter(Boolean).join(' · ')}</div>
                <div className="sc-foot">
                  <span>{s.tag}</span>
                  <span className="sc-val">{s.value || '--'}</span>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </>
  );
}

                  </div>

          </div>
        </div>

  );
}
