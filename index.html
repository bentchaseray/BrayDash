function SkillsPage() {
  const [modal, setModal]   = useState(null);
  const [copied, setCopied] = useState(false);
  const [running, setRunning] = useState({});
  const [ran, setRan]         = useState({});
  const [researchOpen,   setResearchOpen]   = useState(false);
  const [researchBiz,    setResearchBiz]    = useState('');
  const [researchStatus, setResearchStatus] = useState(null); // null | 'running' | 'done' | 'error'

  const openModal = s => { setModal(s); setCopied(false); };
  const close     = () => setModal(null);
  const copy      = () => {
    navigator.clipboard.writeText(modal.prompt).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const runLeadResearch = async (biz) => {
    if (!biz.trim() || researchStatus === 'running') return;
    setResearchStatus('running');
    try {
      const resp = await fetch('/api/trigger', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ workflow: 'lead-research', payload: { businessName: biz.trim() } }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error || `Status ${resp.status}`);
      }
      setResearchStatus('done');
      setTimeout(() => { setResearchStatus(null); setResearchOpen(false); setResearchBiz(''); }, 3000);
    } catch {
      setResearchStatus('error');
      setTimeout(() => setResearchStatus(null), 4000);
    }
  };

  const handleCardClick = async (s, i) => {
    if (s.workflow === 'lead-research') {
      setResearchOpen(o => !o);
      return;
    }
    if (s.workflow) {
      if (running[i]) return;
      setRunning(r => ({ ...r, [i]: true }));
      try {
        await fetch('/api/trigger', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ workflow: s.workflow }),
        });
      } catch {}
      setRunning(r => ({ ...r, [i]: false }));
      setRan(r => ({ ...r, [i]: true }));
      setTimeout(() => setRan(r => ({ ...r, [i]: false })), 3000);
    } else {
      openModal(s);
    }
  };

  return (
    <>
      <div className="topbar">
        <div>
          <div className="crumb"><span>Workspace · Skills</span></div>
          <h1 className="page-title">Skills</h1>
          <div className="subtitle">AI prompt templates for Bray Films. Click any card to copy into Claude.</div>
        </div>
        <div className="top-right"><Clock/></div>
      </div>

      <div className="skills-grid">
        {SKILLS.map((s, i) => (
          <div key={i} className="skill-card" onClick={() => handleCardClick(s, i)}>
            <div className="sk-icon">{I[s.icon]()}</div>
            <div className="sk-title">{s.title}</div>
            <div className="sk-desc">{s.desc}</div>
            {s.workflow === 'lead-research'
              ? researchOpen
                ? <div onClick={e => e.stopPropagation()} style={{ marginTop: 10 }}>
                    <input
                      type="text"
                      value={researchBiz}
                      onChange={e => setResearchBiz(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && runLeadResearch(researchBiz)}
                      placeholder="Business name..."
                      style={{ width: '100%', padding: '6px 10px', borderRadius: 6, border: '1px solid var(--line)', background: 'var(--bg)', color: 'var(--ink)', fontSize: 13, marginBottom: 8, boxSizing: 'border-box' }}
                    />
                    <button
                      onClick={() => runLeadResearch(researchBiz)}
                      disabled={!researchBiz.trim() || researchStatus === 'running'}
                      style={{ width: '100%', padding: '7px 0', borderRadius: 6, border: 'none', background: 'var(--gold)', color: '#000', fontSize: 12, fontWeight: 700, cursor: 'pointer', letterSpacing: '.08em', opacity: !researchBiz.trim() ? 0.5 : 1 }}
                    >
                      {researchStatus === 'running' ? 'Running...' : researchStatus === 'done' ? 'Done!' : researchStatus === 'error' ? 'Error — retry' : 'Research'}
                    </button>
                  </div>
                : <span className="sk-arrow" style={{ color: researchStatus === 'done' ? 'var(--green)' : 'var(--ink-3)', fontSize: 11, letterSpacing: '.08em' }}>
                    {researchStatus === 'done' ? 'Done!' : I.arrow()}
                  </span>
              : s.workflow
                ? <span className="sk-arrow" style={{ color: running[i] ? 'var(--gold)' : ran[i] ? 'var(--green)' : 'var(--ink-3)', fontSize: 11, letterSpacing: '.08em' }}>
                    {running[i] ? 'Running...' : ran[i] ? 'Done!' : I.arrow()}
                  </span>
                : <span className="sk-arrow">{I.chev()}</span>}
          </div>
        ))}
      </div>

      {modal && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && close()}>
          <div className="modal">
            <div className="modal-head">
              <h3>{modal.title}</h3>
              <div className="modal-close" onClick={close}>{I.x()}</div>
            </div>
            <div className="modal-body">
              <div className="modal-prompt">{modal.prompt}</div>
            </div>
            <div className="modal-foot">
              <button className="cancel-btn" onClick={close}>Close</button>
              <button className="copy-btn" onClick={copy}>{I.copy()} {copied ? 'Copied!' : 'Copy Prompt'}</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

const PLATFORM_TARGETS = [
  { platform: 'Instagram Reels',   target: '3x / week', color: 'var(--orange)' },
  { platform: 'Instagram Stories', target: 'Daily',     color: 'var(--gold)' },
  { platform: 'Facebook Page',     target: '2x / week', color: 'var(--blue)' },
  { platform: 'TikTok',            target: '2x / week', color: 'var(--green)' },
];

const STATUS_COLOR = { READY: 'var(--green)', DRAFT: 'var(--gold)', FILMING: 'var(--blue)', IDEA: 'var(--ink-3)', POSTED: 'var(--ink-3)', SCHEDULED: 'var(--blue)' };

function parsePublishingSchedule(md) {
  if (!md) return [];
  const lines = md.split('\n');
  const posts = [];
  let id = 0;

  // Try markdown table format first
  const tableStart = lines.findIndex(l => l.trim().startsWith('|') && /platform|status|type|date/i.test(l));
  if (tableStart !== -1) {
    const rawHeaders = lines[tableStart].split('|').map(h => h.trim().toLowerCase()).filter(Boolean);
    let i = tableStart + 1;
    if (i < lines.length && /^\|[-:\s|]+\|/.test(lines[i])) i++;
    while (i < lines.length && lines[i].trim().startsWith('|')) {
      const cells = lines[i].split('|').map(c => c.trim()).filter(Boolean);
      if (cells.length > 0) {
        const row = {};
        rawHeaders.forEach((h, idx) => { row[h] = cells[idx] || ''; });
        const status = (row['status'] || 'IDEA').trim().toUpperCase();
        if (status !== '---' && status !== '') {
          posts.push({
            id: `pub-${id++}`,
            title:    row['title'] || row['content'] || row['description'] || row['post'] || `Entry ${id}`,
            platform: row['platform'] || '',
            type:     (row['type'] || row['content type'] || 'POST').toUpperCase(),
            pillar:   row['pillar'] || '',
            date:     row['date'] || row['suggested date'] || row['scheduled date'] || '',
            status,
            caption:  row['caption'] || row['notes'] || row['copy'] || '',
            hook:     row['hook'] || '',
          });
        }
      }
      i++;
    }
    if (posts.length > 0) return posts;
  }

  // Section format: ## Entry Title with key: value lines below
  let cur = null;
  const flush = () => { if (cur) { posts.push({ id: `pub-${id++}`, ...cur }); cur = null; } };
  for (const line of lines) {
    if (/^##\s+/.test(line)) {
      flush();
      cur = { title: line.replace(/^##\s+/, '').trim(), platform: '', type: 'POST', pillar: '', date: '', status: 'IDEA', caption: '', hook: '' };
    } else if (cur) {
      const m = line.match(/^[-*]?\s*([A-Za-z ]+):\s*(.+)/);
      if (m) {
        const k = m[1].trim().toLowerCase(), v = m[2].trim();
        if (k === 'platform') cur.platform = v;
        else if (k === 'type' || k === 'content type') cur.type = v.toUpperCase();
        else if (k === 'pillar') cur.pillar = v;
        else if (k === 'date' || k === 'suggested date' || k === 'scheduled date') cur.date = v;
        else if (k === 'status') cur.status = v.toUpperCase();
        else if (k === 'caption' || k === 'copy') cur.caption = v;
        else if (k === 'hook') cur.hook = v;
      }
    }
  }
  flush();
  return posts;
}

function PostModal({ post, onClose }) {
  const [copied, setCopied] = React.useState(false);
  const copy = () => { navigator.clipboard.writeText(post.caption).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }); };
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-box" style={{ maxWidth: 560 }} onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div>
            <div className="modal-eyebrow">{post.type} · {post.platform}</div>
            <div className="modal-title">{post.title}</div>
          </div>
          <button className="modal-x" onClick={onClose}>{I.x()}</button>
        </div>
        <div className="modal-body">
          {post.hook && (
            <div className="modal-section">
              <div className="modal-section-label">Hook</div>
              <div className="modal-section-val" style={{ fontStyle: 'italic', color: 'var(--gold)' }}>{post.hook}</div>
            </div>
          )}
          {post.caption && (
            <div className="modal-section">
              <div className="modal-section-label">Caption</div>
              <div className="modal-section-val" style={{ whiteSpace: 'pre-wrap', lineHeight: 1.6 }}>{post.caption}</div>
            </div>
          )}
          {post.pillar && (
            <div className="modal-section">
              <div className="modal-section-label">Pillar</div>
              <div className="modal-section-val">{post.pillar}</div>
            </div>
          )}
          <div className="modal-section">
            <div className="modal-section-label">Status</div>
            <div style={{ color: STATUS_COLOR[post.status] || 'var(--ink)' }}>{post.status}</div>
          </div>
          {post.date && (
            <div className="modal-section">
              <div className="modal-section-label">Date</div>
              <div className="modal-section-val">{post.date}</div>
            </div>
          )}
        </div>
        <div className="modal-foot">
          <button className="cancel-btn" onClick={onClose}>Close</button>
          {post.caption && <button className="copy-btn" onClick={copy}>{I.copy()} {copied ? 'Copied!' : 'Copy Caption'}</button>}
        </div>
      </div>
    </div>
  );
}

function PublishingPage() {
  const { data: schedRaw, loading: schedLoading, error: schedError, retry: schedRetry } = useVaultFile('wiki/Content/publishing-schedule.md');
  const { data: hotRaw } = useVaultFile('hot.md');
  const [activePost, setActivePost] = React.useState(null);
  const [filter, setFilter]         = React.useState('ALL');
  const [adding, setAdding]         = React.useState({});

  const posts = React.useMemo(() => parsePublishingSchedule(schedRaw), [schedRaw]);

  // Get confirmed upcoming shoots from hot.md for gap detection
  const hotParsed = hotRaw ? parseHot(hotRaw) : null;
  const confirmedShoots = hotParsed ? hotParsed.shoots.filter(s => {
    if (/open|fell.through|renewal/i.test(s.job)) return false;
    const d = daysUntil(s.date);
    return d !== null && d >= 0;
  }) : [];

  // Find shoots with no content entry planned
  const shootsWithGap = confirmedShoots.filter(shoot => {
    const shootNameLower = shoot.job.toLowerCase();
    return !posts.some(p =>
      p.title.toLowerCase().includes(shootNameLower.split(' ')[0]) ||
      (p.caption || '').toLowerCase().includes(shootNameLower.split(' ')[0])
    );
  });

  const STATUSES = ['ALL', 'READY', 'DRAFT', 'SCHEDULED', 'FILMING', 'IDEA', 'POSTED'];
  const shown = filter === 'ALL' ? posts : posts.filter(p => p.status === filter);

  const appendToSchedule = async (shoot, type) => {
    const key = shoot.job + type;
    setAdding(a => ({ ...a, [key]: true }));
    try {
      const current = schedRaw || '';
      const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const entry = `\n## ${type === 'reel' ? 'Reel' : 'Photo'} - ${shoot.job}\n- Platform: Instagram\n- Type: ${type === 'reel' ? 'REEL' : 'PHOTO'}\n- Date: ${shoot.date}\n- Status: DRAFT\n- Pillar: Showcase\n- Caption: [Draft caption for ${shoot.job}]\n`;
      const newContent = current.trimEnd() + entry;
      const resp = await fetch('/api/vault-write', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ file: 'wiki/Content/publishing-schedule.md', content: newContent }),
      });
      if (!resp.ok) throw new Error('Write failed');
      schedRetry();
    } catch (e) {
      alert('Could not add entry: ' + e.message);
    } finally {
      setAdding(a => ({ ...a, [key]: false }));
    }
  };

  return (
    <>
      <div className="topbar">
        <div>
          <div className="crumb"><span>Marketing · Publishing</span></div>
          <h1 className="page-title">Publishing Schedule</h1>
          <div className="subtitle">
            {schedLoading ? 'Loading...' : <><em>{posts.length} entries</em> in content vault.</>}
          </div>
        </div>
        <div className="top-right">
          <Clock/>
        </div>
      </div>

      {/* Platform targets */}
      <div className="platform-row" style={{ gridTemplateColumns: 'repeat(4, 1fr)', marginBottom: 20 }}>
        {PLATFORM_TARGETS.map((p, i) => (
          <div key={i} className="platform-card">
            <div className="platform-name" style={{ color: p.color }}>{p.platform}</div>
            <div className="platform-target">{p.target}</div>
          </div>
        ))}
      </div>

      {/* Shoot gap detection */}
      {shootsWithGap.length > 0 && (
        <div style={{ marginBottom: 20 }}>
          {shootsWithGap.map(shoot => (
            <div key={shoot.job} style={{ background: 'rgba(245,158,11,.06)', border: '1px solid rgba(245,158,11,.25)', borderRadius: 10, padding: '12px 16px', marginBottom: 10, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 10 }}>
              <span style={{ fontSize: 13, color: 'var(--ink-2)' }}>
                <span style={{ color: 'var(--orange)', fontWeight: 600 }}>{shoot.job}</span> on {shoot.date} has no content planned.
              </span>
              <div style={{ display: 'flex', gap: 8 }}>
                <button
                  disabled={adding[shoot.job + 'reel']}
                  onClick={() => appendToSchedule(shoot, 'reel')}
                  style={{ fontSize: 11, padding: '5px 12px', background: 'rgba(245,158,11,.12)', border: '1px solid rgba(245,158,11,.30)', color: 'var(--orange)', borderRadius: 6, cursor: 'pointer' }}
                >
                  {adding[shoot.job + 'reel'] ? 'Adding...' : '+ Add Reel slot'}
                </button>
                <button
                  disabled={adding[shoot.job + 'photo']}
                  onClick={() => appendToSchedule(shoot, 'photo')}
                  style={{ fontSize: 11, padding: '5px 12px', background: 'rgba(245,158,11,.08)', border: '1px solid rgba(245,158,11,.20)', color: 'var(--ink-2)', borderRadius: 6, cursor: 'pointer' }}
                >
                  {adding[shoot.job + 'photo'] ? 'Adding...' : '+ Add Photo slot'}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Filter pills */}
      <div className="filter-row" style={{ marginBottom: 16 }}>
        {STATUSES.map(s => (
          <button key={s} className={'filter-pill ' + (filter === s ? 'active' : '')} onClick={() => setFilter(s)}>{s}</button>
        ))}
      </div>

      {/* States */}
      {schedLoading && (
        <div style={{ padding: '32px 0', textAlign: 'center', color: 'var(--ink-3)', fontSize: 13 }}>
          <span className="pulse" style={{ display: 'inline-block', marginRight: 8 }}></span>Loading publishing schedule from vault...
        </div>
      )}
      {schedError && !schedLoading && (
        <div className="err-banner">
          Could not load publishing-schedule.md -- {schedError}
          <button onClick={schedRetry} style={{ marginLeft: 10, background:'none', border:'1px solid rgba(239,68,68,.4)', color:'#fca5a5', borderRadius:5, padding:'2px 8px', cursor:'pointer', fontSize:12 }}>Retry</button>
        </div>
      )}
      {!schedLoading && !schedError && posts.length === 0 && (
        <div style={{ padding: '40px 0', textAlign: 'center', color: 'var(--ink-3)', fontSize: 13 }}>
          No posts found in publishing-schedule.md. Add entries to the vault file to see them here.
        </div>
      )}

      {/* Content grid */}
      {!schedLoading && shown.length > 0 && (
        <div className="content-grid">
          {shown.map(post => (
            <div key={post.id} className="content-card" onClick={() => setActivePost(post)}>
              <div className="content-card-top">
                <span className="content-type">{post.type}</span>
                <span className="content-status" style={{ color: STATUS_COLOR[post.status] || 'var(--ink-3)' }}>{post.status}</span>
              </div>
              <div className="content-title">{post.title}</div>
              {post.platform && <div className="content-platform">{post.platform}{post.date ? ` · ${post.date}` : ''}</div>}
              {post.hook && <div className="content-hook">{post.hook}</div>}
              {!post.hook && post.caption && <div className="content-hook" style={{ opacity: .7 }}>{post.caption.slice(0, 80)}{post.caption.length > 80 ? '...' : ''}</div>}
            </div>
          ))}
        </div>
      )}

      {activePost && <PostModal post={activePost} onClose={() => setActivePost(null)}/>}
    </>
  );
}

/* ════════════════════════════════════════════
   PAGE 9: Calendar

function CalendarPage({ go }) {
  const [shoots,   setShoots]  = useState([]);
  const [loading,  setLoading] = useState(true);
  const [view,     setView]    = useState(() => { const n = new Date(); return { year: n.getFullYear(), month: n.getMonth() }; });
  const [selected, setSelected] = useState(null);

  useEffect(() => {
    fetch('/api/calendar?days=120')
      .then(r => r.ok ? r.json() : [])
      .catch(() => [])
      .then(data => { setShoots(data); setLoading(false); });
  }, []);

  useEffect(() => { setSelected(null); }, [view]);

  const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAY_HDRS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const { year, month } = view;

  const byDate = {};
  shoots.forEach(s => { if (!byDate[s.date]) byDate[s.date] = []; byDate[s.date].push(s); });

  const mkDate = (y, m, d) => `${y}-${String(m + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const firstDow    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const prevDays    = new Date(year, month, 0).getDate();
  const todayStr    = new Date().toISOString().split('T')[0];

  const cells = [];
  for (let i = firstDow - 1; i >= 0; i--)
    cells.push({ day: prevDays - i, dateStr: mkDate(month === 0 ? year - 1 : year, month === 0 ? 11 : month - 1, prevDays - i), outside: true });
  for (let d = 1; d <= daysInMonth; d++)
    cells.push({ day: d, dateStr: mkDate(year, month, d), outside: false });
  const tail = (7 - (cells.length % 7)) % 7;
  for (let d = 1; d <= tail; d++)
    cells.push({ day: d, dateStr: mkDate(month === 11 ? year + 1 : year, month === 11 ? 0 : month + 1, d), outside: true });

  const thisMonthShoots = shoots.filter(s => s.date.startsWith(`${year}-${String(month + 1).padStart(2,'0')}`));
  const prevMonth = () => setView(({ year: y, month: m }) => m === 0 ? { year: y - 1, month: 11 } : { year: y, month: m - 1 });
  const nextMonth = () => setView(({ year: y, month: m }) => m === 11 ? { year: y + 1, month: 0 } : { year: y, month: m + 1 });

  return (
    <>
      <div className="topbar">
        <div>
          <div className="crumb"><span>Tools · Calendar</span></div>
          <h1 className="page-title">Calendar</h1>
          <div className="subtitle">
            {loading ? '--' : <em>{thisMonthShoots.length} shoot{thisMonthShoots.length !== 1 ? 's' : ''}</em>} scheduled this month.
          </div>
        </div>
        <div className="top-right"><Clock/></div>
      </div>

      {/* Month navigator */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 20 }}>
        <button onClick={prevMonth} style={{ background: 'none', border: '1px solid var(--line)', color: 'var(--ink-2)', borderRadius: 6, padding: '4px 14px', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>&#8249;</button>
        <span style={{ fontWeight: 700, fontSize: 15, color: 'var(--gold)', minWidth: 150, textAlign: 'center', letterSpacing: '.06em' }}>
          {MONTHS[month]} {year}
        </span>
        <button onClick={nextMonth} style={{ background: 'none', border: '1px solid var(--line)', color: 'var(--ink-2)', borderRadius: 6, padding: '4px 14px', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>&#8250;</button>
      </div>

      {/* Grid + optional detail panel */}
      <div style={{ display: 'grid', gridTemplateColumns: selected ? '1fr 260px' : '1fr', gap: 20, alignItems: 'start' }}>
        <div>
          {/* Day-of-week headers */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3, marginBottom: 3 }}>
            {DAY_HDRS.map(d => (
              <div key={d} style={{ textAlign: 'center', fontSize: 10, fontWeight: 600, letterSpacing: '.14em', color: 'var(--ink-3)', padding: '4px 0' }}>{d}</div>
            ))}
          </div>

          {/* Day cells */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3 }}>
            {cells.map((cell, i) => {
              const cellShoots = byDate[cell.dateStr] || [];
              const hasShoot   = cellShoots.length > 0 && !cell.outside;
              const isToday    = cell.dateStr === todayStr;
              return (
                <div
                  key={i}
                  onClick={() => hasShoot && setSelected(cellShoots[0])}
                  style={{
                    background: hasShoot ? 'rgba(196,154,60,0.08)' : 'var(--card)',
                    border: isToday ? '1px solid var(--gold)' : hasShoot ? '1px solid rgba(196,154,60,0.30)' : '1px solid var(--line)',
                    borderRadius: 8, padding: '6px 7px', minHeight: 72,
                    opacity: cell.outside ? 0.3 : 1,
                    cursor: hasShoot ? 'pointer' : 'default',
                    transition: 'border-color .15s',
                  }}
                >
                  <div style={{ fontSize: 11, color: isToday ? 'var(--gold)' : 'var(--ink-3)', fontFamily: "'JetBrains Mono', monospace", marginBottom: 4, fontWeight: isToday ? 700 : 400 }}>
                    {cell.day}
                  </div>
                  {cellShoots.map((s, j) => (
                    <div key={j} style={{ background: 'rgba(196,154,60,0.15)', border: '1px solid rgba(196,154,60,0.35)', borderRadius: 4, padding: '2px 5px', fontSize: 9.5, fontWeight: 600, color: 'var(--gold)', marginBottom: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      {s.title}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>

          {/* Empty state */}
          {!loading && thisMonthShoots.length === 0 && (
            <div style={{ textAlign: 'center', color: 'var(--ink-2)', padding: '32px 0', fontSize: 13 }}>
              {I.cal()} No shoots scheduled this month.
            </div>
          )}
        </div>

        {/* Detail panel */}
        {selected && (
          <div style={{ background: 'var(--card)', border: '1px solid var(--line)', borderRadius: 8, padding: 20 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
              <span style={{ fontSize: 10, letterSpacing: '.12em', color: 'var(--gold)', textTransform: 'uppercase', fontWeight: 700 }}>Shoot Detail</span>
              <button onClick={() => setSelected(null)} style={{ background: 'none', border: 'none', color: 'var(--ink-3)', cursor: 'pointer', padding: 0, display: 'flex' }}>{I.x()}</button>
            </div>
            <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--ink)', marginBottom: 6 }}>{selected.title}</div>
            <div style={{ fontSize: 12, color: 'var(--ink-2)', marginBottom: 2 }}>{selected.dateFormatted}</div>
            <div style={{ fontSize: 11, color: selected.daysOut === 0 ? 'var(--gold)' : 'var(--ink-3)', marginBottom: 10, fontWeight: selected.daysOut === 0 ? 700 : 400 }}>
              {selected.daysOut === 0 ? 'Today' : `${selected.daysOut} day${selected.daysOut !== 1 ? 's' : ''} out`}
            </div>
            {selected.location && <div style={{ fontSize: 12, color: 'var(--ink-2)', marginBottom: 6 }}>{selected.location}</div>}
            {selected.value && <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 14, color: 'var(--gold)', fontWeight: 700, marginBottom: 10 }}>{selected.value}</div>}
            {selected.description && <div style={{ fontSize: 12, color: 'var(--ink-2)', lineHeight: 1.6, marginBottom: 14 }}>{selected.description}</div>}
            <button
              onClick={() => go('shoots')}
              style={{ background: 'none', border: '1px solid var(--line)', color: 'var(--ink-2)', borderRadius: 6, padding: '6px 12px', cursor: 'pointer', fontSize: 12, width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4 }}
            >
              View in Shoots {I.arrow({ width: 11, height: 11 })}
            </button>
          </div>
        )}
      </div>
    </>
  );
}

/* ════════════════════════════════════════════
   PAGE 10: Agents
════════════════════════════════════════════ */
const AGENT_DEFS = [
  {
    id: 'outreach',
    name: 'Outreach',
    tag: 'Walk-ins, cold calls, email sequences',
    icon: 'target',
    greeting: "I have your playbook loaded. What are you walking into today -- walk-in, cold call, or email?",
    ctx: ['playbook', 'voice', 'pricing', 'hot leads'],
  },
  {
    id: 'pipeline',
    name: 'Pipeline',
    tag: 'Who to follow up with and how',
    icon: 'flame',
    greeting: "I have your HOT leads and pipeline loaded. Who do you want to move forward today?",
    ctx: ['hot leads', 'pricing', 'voice', 'log'],
  },
  {
    id: 'content',
    name: 'Content',
    tag: 'Captions, calendar, and posting plan',
    icon: 'cam',
    greeting: "I have your content calendar loaded. What do you need -- a caption, a posting plan, or a hook?",
    ctx: ['schedule', 'voice', 'hot leads'],
  },
  {
    id: 'proposal',
    name: 'Proposal',
    tag: 'Build pitches for any prospect',
    icon: 'dollar',
    greeting: "I have your pricing and voice loaded. Give me a business name or type and I'll build the pitch.",
    ctx: ['pricing', 'voice', 'playbook', 'hot leads'],
  },
];

function AgentsPage() {
  const [activeAgent, setActiveAgent]   = React.useState(null);
  const [messages, setMessages]         = React.useState([]);
  const [input, setInput]               = React.useState('');
  const [loading, setLoading]           = React.useState(false);
  const [apiMissing, setApiMissing]     = React.useState(false);
  const messagesEndRef                  = React.useRef(null);
  const textareaRef                     = React.useRef(null);

  const scrollToBottom = () => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  };

  React.useEffect(() => { scrollToBottom(); }, [messages, loading]);

  const selectAgent = (agent) => {
    if (activeAgent && activeAgent.id !== agent.id && messages.length > 1) {
      if (!window.confirm('Switch agents? This will clear the chat.')) return;
    }
    setActiveAgent(agent);
    setInput('');
    setApiMissing(false);
    setMessages([{ role: 'assistant', content: agent.greeting }]);
  };

  const sendMessage = async () => {
    const text = input.trim();
    if (!text || loading || !activeAgent) return;

    const userMsg  = { role: 'user', content: text };
    const nextMsgs = [...messages, userMsg];
    setMessages(nextMsgs);
    setInput('');
    setLoading(true);

    try {
      const res = await fetch('/api/agent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          agentType: activeAgent.id,
          messages: nextMsgs.map(m => ({ role: m.role, content: m.content })),
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        if (err.error === 'ANTHROPIC_API_KEY not configured') {
          setApiMissing(true);
          setMessages(prev => [...prev, { role: 'assistant', content: '__api_missing__' }]);
        } else {
          setMessages(prev => [...prev, { role: 'assistant', content: `Error: ${err.error || 'Agent unavailable. Check API key in Vercel env vars.'}` }]);
        }
        return;
      }

      const data = await res.json();
      setMessages(prev => [...prev, { role: 'assistant', content: data.content }]);
    } catch {
      setMessages(prev => [...prev, { role: 'assistant', content: 'Agent unavailable -- check API key in Vercel env vars.' }]);
    } finally {
      setLoading(false);
    }
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  return (
    <>
      <div className="topbar">
        <div>
          <div className="crumb"><span className="live-badge"><span className="pulse"/></span> Live</div>
          <h1 className="page-title">AI Agents</h1>
          <div className="subtitle">Outreach, pipeline, content, and proposal -- all loaded with your vault context</div>
        </div>
        <div className="top-right"><Clock/></div>
      </div>

      {apiMissing && (
        <div className="ag-no-key">
          Agents require an Anthropic API key. Add <b>ANTHROPIC_API_KEY</b> to your Vercel environment variables, then redeploy.
        </div>
      )}

      <div className="ag-selector">
        {AGENT_DEFS.map(agent => (
          <div
            key={agent.id}
            className={'ag-card' + (activeAgent?.id === agent.id ? ' active' : '')}
            onClick={() => selectAgent(agent)}
          >
            <div className="ag-card-icon">{I[agent.icon]({ width: 16, height: 16 })}</div>
            <div className="ag-card-name">{agent.name}</div>
            <div className="ag-card-tag">{agent.tag}</div>
          </div>
        ))}
      </div>

      {!activeAgent && (
        <div className="panel">
          <div className="ag-empty">Select an agent above to start a conversation.</div>
        </div>
      )}

      {activeAgent && (
        <div className="ag-panel">
          <div className="ag-context-strip">
            <span className="ag-context-label">Context</span>
            {activeAgent.ctx.map((c, i) => <span key={i} className="ag-ctx-pill">{c}</span>)}
          </div>

          <div className="ag-messages">
            {messages.map((m, i) => (
              <div key={i} className={m.role === 'user' ? 'ag-bubble-wrap-user' : 'ag-bubble-wrap-ai'}>
                {m.content === '__api_missing__'
                  ? <div className="ag-bubble-ai" style={{ color: '#fca5a5' }}>
                      Add <b>ANTHROPIC_API_KEY</b> to Vercel env vars and redeploy.
                    </div>
                  : <div className={m.role === 'user' ? 'ag-bubble-user' : 'ag-bubble-ai'}>
                      {m.content}
                    </div>
                }
              </div>
            ))}
            {loading && (
              <div className="ag-bubble-wrap-ai">
                <div className="ag-bubble-ai ag-typing">
                  <span className="ag-dot"/><span className="ag-dot"/><span className="ag-dot"/>
                </div>
              </div>
            )}
            <div ref={messagesEndRef}/>
          </div>

          <div className="ag-input-row">
            <textarea
              ref={textareaRef}
              className="ag-input"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
              placeholder="Type a message... (Enter to send, Shift+Enter for new line)"
              rows={1}
            />
            <button
              className="ag-send"
              onClick={sendMessage}
              disabled={!input.trim() || loading}
              title="Send"
            >
              {I.send({ width: 15, height: 15 })}
            </button>
          </div>
        </div>
      )}
    </>
  );
}

/* ════════════════════════════════════════════
   PAGE 11: Playbook
════════════════════════════════════════════ */
function PlaybookPage() {
  const { data: raw, loading, error } = useVaultFile('wiki/context/cold-outreach-playbook.md');
  const [retry, setRetry] = React.useState(0);

  const [open, setOpen] = React.useState({ 0: false });

  const SECTION_ORDER = [
    'THE MINDSET SHIFT',
    'CHANNEL 1',
    'CHANNEL 2',
    'CHANNEL 3',
    'HOW THE CHANNELS CONNECT',
    'AIRTABLE WORKFLOW',
    'WEEKLY OUTREACH TARGETS',
    'THE RULE',
  ];

  const sections = React.useMemo(() => {
    if (!raw) return [];
    const parts = raw.split(/\n(?=## )/);
    return parts
      .map(part => {
        const lines = part.split('\n');
        const header = lines[0].replace(/^##\s*/, '').trim();
        const body = lines.slice(1).join('\n').trim();
        return { header, body };
      })
      .filter(s => s.header && !s.header.startsWith('#'));
  }, [raw]);

  const connectSection = React.useMemo(() => {
    return sections.find(s => /HOW THE CHANNELS CONNECT/i.test(s.header));
  }, [sections]);

  const toggleOpen = idx => setOpen(prev => ({ ...prev, [idx]: !prev[idx] }));

  React.useEffect(() => {
    if (sections.length > 0) {
      const defaultIdx = sections.findIndex(s => /CHANNEL 1|WALK.IN/i.test(s.header));
      setOpen({ [defaultIdx >= 0 ? defaultIdx : 0]: true });
    }
  }, [sections.length]);

  function renderBody(text) {
    if (!text) return null;
    const lines = text.split('\n');
    const out = [];
    let tableRows = null;
    let tableHeaders = null;

    const flushTable = () => {
      if (tableHeaders && tableRows && tableRows.length > 0) {
        out.push(
          <table key={'tbl-' + out.length} className="pb-table">
            <thead>
              <tr>{tableHeaders.map((h, i) => <th key={i}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {tableRows.map((row, ri) => (
                <tr key={ri}>{row.map((cell, ci) => <td key={ci}>{cell}</td>)}</tr>
              ))}
            </tbody>
          </table>
        );
      }
      tableHeaders = null;
      tableRows = null;
    };

    lines.forEach((line, i) => {
      const trimmed = line.trim();

      if (/^\|[-:\s|]+\|$/.test(trimmed)) return;

      if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
        const cells = trimmed.split('|').map(c => c.trim()).filter((_, idx, a) => idx > 0 && idx < a.length - 1);
        if (!tableHeaders) {
          tableHeaders = cells;
          tableRows = [];
        } else {
          tableRows.push(cells);
        }
        return;
      }

      if (tableHeaders) flushTable();

      if (/^### /.test(line)) {
        out.push(<div key={i} className="pb-h3">{line.replace(/^###\s*/, '')}</div>);
      } else if (/^## /.test(line)) {
        out.push(<div key={i} className="pb-h2">{line.replace(/^##\s*/, '')}</div>);
      } else if (/^> /.test(line)) {
        out.push(<div key={i} className="pb-script">{line.replace(/^>\s*/, '')}</div>);
      } else if (/^---+$/.test(trimmed)) {
        out.push(<hr key={i} className="pb-rule"/>);
      } else if (/^\*\*(.+)\*\*$/.test(trimmed)) {
        out.push(<div key={i} className="pb-bold">{trimmed.replace(/^\*\*|\*\*$/g, '')}</div>);
      } else if (/^[-*] /.test(trimmed)) {
        out.push(<div key={i} className="pb-li">{trimmed.replace(/^[-*]\s*/, '')}</div>);
      } else if (trimmed === '') {
        out.push(<div key={i} style={{ height: 6 }}/>);
      } else {
        const withBold = trimmed.replace(/\*\*(.+?)\*\*/g, (_, m) => `<b>${m}</b>`);
        out.push(<div key={i} className="pb-p" dangerouslySetInnerHTML={{ __html: withBold }}/>);
      }
    });

    if (tableHeaders) flushTable();
    return out;
  }

  const now = useClock();
  const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  const dateStr = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

  return (
    <>
      <div className="topbar">
        <div>
          <div className="crumb"><span className="live-badge"><span className="pulse"/></span> Live</div>
          <h1 className="page-title">Cold Outreach Playbook</h1>
          <div className="subtitle">Walk-ins · Cold calls · Email sequences</div>
        </div>
        <div className="top-right">
          <Clock/>
        </div>
      </div>

      {loading && <div className="pb-load">Loading playbook...</div>}

      {error && !loading && (
        <div className="pb-error">
          Could not load playbook.
          <br/>
          <button className="pb-retry" onClick={() => setRetry(r => r + 1)}>Retry</button>
        </div>
      )}

      {!loading && !error && sections.length === 0 && (
        <div className="pb-load">Playbook not found in vault.</div>
      )}

      {!loading && !error && sections.length > 0 && (
        <>
          {connectSection && (
            <div className="pb-intro">
              <strong>How the channels connect:</strong>{' '}
              {connectSection.body.split('\n').find(l => l.trim() && !l.startsWith('#') && !l.startsWith('|')) || ''}
            </div>
          )}

          <div className="pb-accordion">
            {sections.map((sec, idx) => {
              const isOpen = !!open[idx];
              return (
                <div key={idx} className="pb-section">
                  <div className="pb-section-head" onClick={() => toggleOpen(idx)}>
                    <h3>{sec.header}</h3>
                    <span className={'pb-section-chev' + (isOpen ? ' open' : '')}>{I.chev()}</span>
                  </div>
                  {isOpen && (
                    <div className="pb-section-body">
                      {renderBody(sec.body)}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}
    </>
  );
}

/* ════════════════════════════════════════════
   Bottom Tab Bar (mobile only)
════════════════════════════════════════════ */
const TAB_BAR = NAV;
function BottomTabBar({ active, go }) {
  return (
    <nav className="bottom-tab-bar">
      {TAB_BAR.map(t => (
        <button key={t.id} className={'tab-btn ' + (active === t.id ? 'active' : '')} onClick={() => go(t.id)}>
          {I[t.icon]({ width: 20, height: 20 })}
          <span className="tab-label-sm">{t.label}</span>
        </button>
      ))}
    </nav>
  );
}

/* ════════════════════════════════════════════
   Root App
════════════════════════════════════════════ */
function App() {
  const [page, setPage]   = useState('dash');
  const [modal, setModal] = useState(null);
  const { data: hotRaw, loading: hotLoading } = useVaultFile('hot.md');
  const leadCount = React.useMemo(() => {
    if (hotLoading) return '…';
    if (!hotRaw) return null;
    const parsed = parseHot(hotRaw);
    return parsed ? String(parsed.pipeline.length) : null;
  }, [hotRaw, hotLoading]);
  const openModal  = data => setModal(data);
  const closeModal = ()   => setModal(null);

  const content = {
    dash:       <DashPage       openModal={openModal}/>,
    leads:      <LeadsPage      openModal={openModal}/>,
    meta:       <MetaAdsPage/>,
    publishing: <PublishingPage/>,
    shoots:     <ShootsPage     openModal={openModal}/>,
    revenue:    <RevenuePage    openModal={openModal}/>,
    skills:     <SkillsPage/>,
    calendar:   <CalendarPage   go={setPage}/>,
    agents:     <AgentsPage/>,
    playbook:   <PlaybookPage/>,
  }[page];

  return (
    <div className="app">
      <Sidebar active={page} go={setPage} leadCount={leadCount}/>
      <main>{content}</main>
      <ModalManager modal={modal} onClose={closeModal}/>
      <BottomTabBar active={page} go={setPage}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
